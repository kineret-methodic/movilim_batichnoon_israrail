<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title"></title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;direction:rtl}
  body{font-family:'Heebo','Arial',sans-serif;background:#F0F2F7;color:#1A1C50;-webkit-font-smoothing:antialiased}

  /* ── Nav bar ── */
  #nav{position:fixed;top:0;right:0;left:0;background:#1E1F56;
    padding:6px 14px;display:flex;gap:6px;z-index:999;align-items:center;flex-wrap:wrap;
    border-bottom:3px solid #F5C800}
  #nav span{color:#A0A8D8;font-size:11px;padding:4px 6px}
  .nav-btn{color:#C8CEF0;font-size:12px;padding:4px 10px;border-radius:4px;
    border:1px solid #3A3E88;cursor:pointer;background:none;font-family:inherit;white-space:nowrap}
  .nav-btn:hover{background:#2A2E72}
  .nav-btn.active{background:#F5C800;color:#000000;border-color:#F5C800;font-weight:700}

  /* ── Main layout ── */
  #app{padding-top:40px;height:100vh;display:flex;flex-direction:column}

  /* ── Facilitator header ── */
  .f-header{background:#1E1F56;padding:10px 20px;
    display:flex;align-items:center;gap:14px;flex-shrink:0;
    border-bottom:1px solid #2E3080}
  .f-title{font-size:18px;font-weight:800;letter-spacing:.02em;color:#FFFFFF}
  .f-sub{font-size:11px;color:#8A92CC;flex:1}
  .f-turn-indicator{font-size:13px;font-weight:700;color:#F5C800;
    flex:1;text-align:center;letter-spacing:.01em}
  .back-btn{background:#2A2E72;border:1px solid #3A3E88;color:#C8CEF0;border-radius:6px;
    padding:6px 14px;cursor:pointer;font-size:12px;font-family:inherit}
  .back-btn:hover{background:#3A3E88}

  /* ── Board map ── */
  #board-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 16px;
    background:#F0F2F7;display:flex;flex-direction:column;gap:6px}

  /* Section labels */
  .bsl{display:flex;justify-content:space-between;align-items:center;
    padding:0 2px;margin-top:4px}
  .bsl span:first-child{font-size:11px;font-weight:600;color:#1E1F56}
  .bsl-months{font-size:10px;color:#8A90C0}

  /* Board rows */
  .board-row{display:flex;align-items:center;gap:0;flex-wrap:nowrap;
    justify-content:center;
    background:#FFFFFF;border-radius:12px;padding:8px 10px;
    border:1px solid #D0D4F0;box-shadow:0 1px 4px rgba(30,31,86,.06);
    overflow-x:auto}
  .row-ltr{flex-direction:row-reverse}

  /* Arrow between stations */
  .row-arr{font-size:14px;color:#B0B4D8;flex-shrink:0;padding:0 4px;line-height:1}

  /* Connector between rows */
  .board-conn{display:flex;flex-direction:column;align-items:flex-end;padding-right:24px;height:24px;position:relative}
  .board-conn.left{align-items:flex-start;padding-left:24px;padding-right:0}
  .board-conn.right{align-items:flex-end}
  .conn-v{width:1.5px;background:#B0B4D8;flex:1}
  .conn-a{font-size:14px;color:#B0B4D8;line-height:1}

  /* Station node */
  .sn{border-radius:8px;padding:7px 10px;cursor:pointer;text-align:center;
    flex-shrink:0;min-width:88px;max-width:110px;
    transition:box-shadow .15s,transform .1s;
    box-shadow:0 1px 3px rgba(30,31,86,.1)}
  .sn:hover{transform:scale(1.05);box-shadow:0 3px 10px rgba(30,31,86,.2)}
  .sn-pro{background:#FFFFFF;border:1.5px solid #1E1F56}
  .sn-comp{background:#F0FFF8;border:1.5px solid #1A6A3A}
  .sn-tr{background:#EEF0FF;border:1.5px solid #5A5EAA}
  .sn-tr-comp{background:#E8F5EE;border:2px solid #1A6A3A}
  .sn-ue{background:#FFF3E0;border:1.5px dashed #E07820;min-width:60px}
  .sn-refl{background:#F5F0FF;border:1.5px dashed #8A70C0}
  .sn-month{font-size:8px;color:#8A90C0;margin-bottom:2px}
  .sn-name{font-size:10px;font-weight:600;color:#1A1C50;line-height:1.35}
  .sn-ue .sn-name{color:#7A3A00}
  .sn-tr .sn-name,.sn-tr-comp .sn-name{color:#2A2E72}
  .sn-comp .sn-name,.sn-tr-comp .sn-name{color:#0D3A22}
  .sn-refl .sn-name{color:#4A2A80}
  .sn-toks{display:flex;justify-content:center;gap:3px;margin-top:5px}
  .sn-tok{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,.8);display:inline-block}

  /* keep old .token for status bar */
  .token{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.7);display:inline-block}

  /* ── Facilitator preview mode ── */
  .preview-btn{background:none;border:1.5px solid #3A3E88;border-radius:6px;
    color:#A0A8D8;font-size:18px;width:34px;height:34px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:background .15s,border-color .15s;line-height:1}
  .preview-btn:hover{background:#2A2E72;border-color:#6A70C0}
  .preview-btn.active{background:#1A6A3A;border-color:#2AA060;color:#FFFFFF;
    box-shadow:0 0 8px rgba(26,160,80,.5)}
  .preview-badge{background:#1A6A3A;color:#FFFFFF;font-size:11px;font-weight:700;
    padding:4px 10px;border-radius:12px;letter-spacing:.03em;
    animation:previewPulse 2.5s ease-in-out infinite}
  @keyframes previewPulse{0%,100%{opacity:1}50%{opacity:.7}}

  /* ── Outcome popup ── */
  .outcome-popup-overlay{position:fixed;inset:0;background:rgba(10,12,50,.72);
    z-index:900;display:flex;align-items:center;justify-content:center;padding:20px}
  .outcome-popup{background:#fff;border-radius:18px;padding:32px 28px;max-width:400px;
    width:100%;text-align:center;box-shadow:0 12px 48px rgba(10,12,50,.4);
    animation:popIn .22s cubic-bezier(.34,1.56,.64,1)}
  @keyframes popIn{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
  .outcome-popup-icon{font-size:52px;line-height:1;margin-bottom:8px}
  .outcome-popup-title{font-size:22px;font-weight:800;margin-bottom:6px}
  .outcome-popup-points{font-size:32px;font-weight:800;margin:10px 0}
  .outcome-popup-msg{font-size:14px;line-height:1.6;color:#4A4E7A;margin-bottom:24px}
  .outcome-popup-btn{background:#1E1F56;color:#fff;border:none;border-radius:10px;
    padding:13px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
    transition:background .15s}
  .outcome-popup-btn:hover{background:#2E2F80}

  /* ── Dev skip button ── */
  .dev-skip-btn{background:none;border:1.5px dashed #E07820;border-radius:6px;
    color:#E07820;font-size:12px;font-weight:700;padding:4px 10px;cursor:pointer;
    font-family:inherit;white-space:nowrap;flex-shrink:0;
    transition:background .15s}
  .dev-skip-btn:hover{background:rgba(224,120,32,.15)}

  /* ── Status bar ── */
  #status-bar{background:#1E1F56;display:flex;flex-shrink:0;border-top:2px solid #F5C800}
  .status-item{flex:1;padding:7px 10px;border-left:1px solid #2E3080;display:flex;flex-direction:column;gap:2px}
  .s-grp{font-size:12px;font-weight:700;color:#FFFFFF}
  .s-div{font-size:9px;color:#7A80C0}
  .s-pos{font-size:10px;color:#C8CEF0}
  .s-err{font-size:10px;color:#F5C800}
  .auto-tag{font-size:9px;background:#2A3A18;color:#80D050;border-radius:3px;
    padding:1px 4px;align-self:flex-start;margin-top:1px}

  /* ── Station screen ── */
  #station-screen{flex:1;overflow-y:auto;padding:18px 22px;background:#F0F2F7}
  .st-month{font-size:11px;color:#6A70B0;margin-bottom:4px}
  .st-name{font-size:24px;font-weight:800;color:#1E1F56;margin-bottom:8px}
  .st-principle{font-size:13px;color:#5A60A0;font-style:italic;line-height:1.6;
    padding-bottom:14px;border-bottom:2px solid #D8DAF0;margin-bottom:16px}

  /* ── Question box ── */
  .q-box{background:#FFFFFF;border:1px solid #D0D4F0;border-right:4px solid #1E1F56;
    border-radius:10px;padding:16px 18px;margin-bottom:18px;
    display:flex;gap:18px;align-items:flex-start;
    box-shadow:0 1px 4px rgba(30,31,86,.08)}
  .q-text{flex:1;font-size:15px;color:#1A1C50;line-height:1.7;font-weight:500}

  /* ── Timer ── */
  .timer-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
  .timer-display{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;
    min-width:52px;text-align:center;color:#1E1F56}
  .timer-btn{border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;
    font-family:inherit;font-weight:700;border:1px solid;white-space:nowrap}

  /* ── Group cards ── */
  .cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .g-card{background:#FFFFFF;border-radius:10px;padding:14px;
    border:1px solid #D0D4F0;box-shadow:0 1px 4px rgba(30,31,86,.07)}
  .g-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .g-label{font-weight:700;font-size:13px;color:#1E1F56}
  .g-div{font-size:11px;color:#7A80C0;flex:1}
  .completed-badge{font-size:9px;background:#E8F5EE;color:#1A6A3A;border-radius:4px;
    padding:2px 5px;border:1px solid #A8D8B8}
  .reveal-btn{width:100%;padding:9px;border:none;border-radius:7px;color:#fff;
    font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .reveal-btn:hover{opacity:.88}

  /* ── Answer block ── */
  .ans-row{display:flex;gap:8px;margin-bottom:7px;font-size:12px;line-height:1.5}
  .ans-lbl{color:#6A70B0;font-weight:700;min-width:86px;flex-shrink:0}
  .ans-val{color:#1A1C50}
  .ans-fix{color:#1A6A3A;font-weight:600}
  .outcome-row{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
  .outcome-btn{flex:1;min-width:76px;padding:7px 4px;border:none;border-radius:7px;
    color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1.3}
  .outcome-btn:hover{opacity:.88}
  .completed-note{font-size:11px;color:#7A80C0;font-style:italic;padding:8px 0}

  /* ── Transition box ── */
  .transition-box{background:#FFFFFF;border:2px solid #1E1F56;
    border-radius:12px;padding:28px 24px;text-align:center;
    max-width:520px;margin:0 auto;box-shadow:0 2px 12px rgba(30,31,86,.1)}
  .transition-title{font-size:22px;font-weight:800;color:#1E1F56;margin-bottom:12px}
  .transition-body{font-size:15px;color:#3A3E78;line-height:1.7}

  /* ── Soft warning modal ── */
  .overlay{position:fixed;inset:0;background:rgba(30,31,86,.5);display:flex;
    align-items:center;justify-content:center;z-index:500}
  .modal{background:#FFFFFF;border:2px solid #1E1F56;border-radius:12px;
    padding:26px 28px;max-width:400px;text-align:center;
    box-shadow:0 4px 24px rgba(30,31,86,.2)}
  .modal p{font-size:14px;color:#2A2E72;line-height:1.6;margin-bottom:18px}
  .modal-btns{display:flex;gap:10px;justify-content:center}
  .btn-sec{background:#F0F2F7;border:1px solid #C0C4E8;color:#3A3E78;border-radius:7px;
    padding:8px 18px;cursor:pointer;font-size:12px;font-family:inherit}
  .btn-danger{background:#C8102E;border:1px solid #A00820;color:#FFFFFF;border-radius:7px;
    padding:8px 18px;cursor:pointer;font-size:12px;font-family:inherit}

  /* ── Mobile ── */
  #mobile-wrap{height:calc(100vh - 40px);overflow-y:auto;background:#F5F7FA;
    color:#1A2A3A;max-width:440px;margin:0 auto;font-family:'Heebo','Arial',sans-serif;
    display:flex;flex-direction:column}
  .splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 24px;gap:22px}
  .splash-bar{height:6px;flex-shrink:0;width:100%}
  .splash-logo{display:flex;align-items:center;gap:10px;width:100%}
  .splash-logo-line{flex:1;height:1px;background:#D0D8E0}
  .splash-logo-text{font-size:19px;font-weight:800;letter-spacing:.04em;white-space:nowrap}
  .splash-badge{color:#fff;border-radius:18px;padding:5px 18px;font-size:14px;font-weight:700}
  .splash-div{font-size:15px;color:#444;font-weight:500}
  .splash-intro-card{background:#fff;border-radius:11px;padding:16px 18px;
    box-shadow:0 1px 8px rgba(0,0,0,.08);width:100%}
  .splash-intro-card p{font-size:13px;color:#555;line-height:1.7;margin:0}
  .splash-btn{width:100%;padding:13px;border:none;border-radius:10px;color:#fff;
    font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .m-header{background:#fff;padding:13px 15px 11px;flex-shrink:0}
  .m-header-top{display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .m-badge{color:#fff;border-radius:11px;padding:2px 10px;font-size:11px;font-weight:700}
  .m-div-name{font-size:12px;color:#666;font-weight:500}
  .m-title{font-size:17px;font-weight:800;color:#1A2A3A;letter-spacing:.02em}
  .m-tabs{background:#fff;display:flex;border-bottom:1px solid #E0E8F0;flex-shrink:0}
  .m-tab{flex:1;padding:11px 8px;border:none;background:none;font-size:12px;
    cursor:pointer;font-family:inherit;transition:color .15s}
  .m-content{flex:1;overflow-y:auto;padding:10px 11px 80px}
  .task-list{display:flex;flex-direction:column;gap:9px}
  .t-card{background:#fff;border-radius:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .t-card-header{width:100%;background:none;border:none;display:flex;align-items:center;
    justify-content:space-between;padding:13px 13px;cursor:pointer;font-family:inherit;text-align:right}
  .t-card-name{font-size:13px;font-weight:600;color:#1A2A3A;flex:1}
  .chevron{font-size:13px;color:#AAB8C8;transition:transform .2s;flex-shrink:0}
  .t-card-body{padding:0 13px 14px;border-top:1px solid #F0F4F8}
  .t-section{padding-top:10px}
  .t-section-title{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .t-divider{height:1px;background:#F0F4F8;margin:4px 0}
  .f-row{display:flex;gap:7px;margin-bottom:7px;align-items:flex-start}
  .f-lbl{font-size:11px;color:#7A8A9A;font-weight:600;flex-shrink:0;min-width:100px;padding-top:1px}
  .f-val{font-size:12px;color:#2A3A4A;line-height:1.5;flex:1}
  .milestones-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
  .m-cell{display:flex;flex-direction:column;gap:3px}
  .m-q{color:#fff;border-radius:4px;padding:2px;font-size:10px;font-weight:700;text-align:center}
  .m-v{font-size:10px;color:#4A5A6A;line-height:1.4}
  .comp-card{background:#fff;border-radius:9px;padding:16px 14px;
    box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:9px}
  .comp-title{font-size:15px;font-weight:700;margin-bottom:3px}
  .reminder-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid #E0E8F0;
    padding:9px 14px;display:flex;justify-content:center}
  .reminder-btn{background:none;border:1px solid;border-radius:18px;padding:5px 18px;
    font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100}
  .drawer{position:fixed;bottom:0;right:0;left:0;background:#fff;border-radius:14px 14px 0 0;
    padding:14px 18px 28px;z-index:101;max-width:440px;margin:0 auto;
    box-shadow:0 -4px 24px rgba(0,0,0,.15)}
  .drawer-handle{width:38px;height:4px;border-radius:2px;margin:0 auto 14px}
  .drawer-title{font-size:15px;font-weight:700;color:#1A2A3A;margin-bottom:14px}
  .def-row{margin-bottom:12px}
  .def-term{font-size:12px;font-weight:700;display:block;margin-bottom:2px}
  .def-def{font-size:12px;color:#4A5A6A;line-height:1.5}
  .drawer-close{margin-top:10px;width:100%;background:none;border:1px solid;
    border-radius:7px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

  /* Scrollbar */
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#C0C4E8;border-radius:3px}
</style>
</head>
<body>
<div id="nav">
  <span id="nav-label"></span>
  <button class="nav-btn active" id="nav-fac" onclick="showView('facilitator')">🖥 <span id="nav-fac-lbl"></span></button>

</div>
<div id="app"></div>

// ── Game state ──────────────────────────────────────────
let gameState = {};
GC.groups.forEach(g => {
  // Groups start at order=1 (past the opening transition station)
  gameState[g.id] = {
    groupId: g.id,
    currentStationOrder: 1,
    points: 0,
    waitingOneRound: false,
    playedThisRound: false,
    usedUnexpectedEventIds: [],
    completedStationIds: ['station_start'],
  };
});

function gs(gid){ return gameState[gid]; }
function stationByOrder(order){ return GC.stations.find(s => s.order === order); }
function stationById(id){ return GC.stations.find(s => s.id === id); }
function devStyleVal(v) {
  if (!DEV_MODE || typeof v !== 'string' || !v.includes('יושלם')) return v;
  return `<span style="color:#C8102E;font-weight:700">${v}</span>`;
}

function applyOutcome(groupId, stationId, outcome) {
  const st = stationById(stationId);
  const g = gameState[groupId];
  if (!st) return;
  if (!g.completedStationIds.includes(stationId))
    g.completedStationIds.push(stationId);

  g.playedThisRound = true;

  if (outcome === 'correct') {
    g.points += 10;
    g.currentStationOrder = st.order + 1;
    g.waitingOneRound = false;
  } else if (outcome === 'partial') {
    g.points += 5;
    g.currentStationOrder = st.order + 1; // advance station — but wait next round
    g.waitingOneRound = true;
  } else {
    // wrong: 0 points, stay in same station, wait one round (retry next time)
    g.points += 0;
    g.waitingOneRound = true;
  }
  // advanceTurn() called in goBackToMap — after facilitator returns to map
}

// DEV only — skip current group's turn without answering
function devSkipTurn() {
  if (!DEV_MODE) return;
  const g = gameState[GC.groups[currentTurnGroupIndex].id];
  const st = stationByOrder(g.currentStationOrder);
  // mark as played + advance one station (like a "partial" answer)
  if (st) g.currentStationOrder = st.order + 1;
  g.playedThisRound = true;
  g.waitingOneRound = false;
  if (!g.completedStationIds.includes(st && st.id)) g.completedStationIds.push(st && st.id);
  activeStationId = null;
  advanceTurn();
  renderApp();
}

function advanceTurn() {
  // Move to next group — auto-skip any groups that are waiting this round
  let checked = 0;
  do {
    currentTurnGroupIndex = (currentTurnGroupIndex + 1) % GC.groups.length;
    checked++;
    const gst = gameState[GC.groups[currentTurnGroupIndex].id];
    // Serve the wait: clear flag and mark as "played" so we skip them this round
    if (!gst.playedThisRound && gst.waitingOneRound) {
      gst.waitingOneRound = false;
      gst.playedThisRound = true;
      // Note: currentStationOrder is NOT changed here —
      //   partial already advanced it; wrong stays to retry.
    }
  } while (checked < GC.groups.length &&
           gameState[GC.groups[currentTurnGroupIndex].id].playedThisRound);

  // Round complete when every group has played (or was auto-skipped above)
  const allDone = GC.groups.every(g => {
    const gst = gameState[g.id];
    return gst.playedThisRound || gst.waitingOneRound;
  });

  if (allDone) {
    roundNumber++;
    GC.groups.forEach(g => { gameState[g.id].playedThisRound = false; });
    currentTurnGroupIndex = 0;
  }
}

function skipWaitingGroup(groupId) {
  // Manual skip by facilitator (e.g. if a waiting group opens their station)
  // Do NOT advance station — let advanceTurn's auto-skip handle the wait
  const g = gameState[groupId];
  g.waitingOneRound = false;
  g.playedThisRound = true;
  advanceTurn();
  activeStationId = null;
  renderApp();
}

}

function renderGroupCardModal(group, question, answered, devMode) {
  const ans = question.answersByGroup[group.id];
  const revealed = devMode || revealedGroups.has(group.id);
  const col = COLOR[group.colorToken];
  const copy = GC.uiCopy;
  const gst = gs(group.id);
  const completed = gst.completedStationIds.includes(activeStationId);

  let inner = '';
  if (!revealed) {
    inner = `<button class="reveal-btn" style="background:${col.primary}"
      onclick="revealGroup('${group.id}')">${copy.buttons.revealAnswer}</button>`;
  } else if (!devMode && answered) {
    inner = `<p style="font-size:12px;color:#5A7A9A;font-style:italic">${GC.uiCopy.groupCard.answerRecorded}</p>`;
  } else if (ans) {
    inner = `
      <div class="ans-row"><span class="ans-lbl">${copy.answerCard.taskLabel}</span><span class="ans-val">${ans.taskName}</span></div>
      <div class="ans-row"><span class="ans-lbl">${copy.answerCard.whatIsWrongLabel}</span><span class="ans-val">${ans.whatIsWrong}</span></div>
      <div class="ans-row"><span class="ans-lbl">${copy.answerCard.correctFixLabel}</span><span class="ans-fix">${ans.correctFix}</span></div>
      ${ans.facilitatorNotes ? `<div class="ans-row"><span class="ans-lbl">${copy.answerCard.facilitatorNoteLabel}</span><span class="ans-val">${ans.facilitatorNotes}</span></div>` : ''}
      ${!devMode ? `<div class="outcome-row">
        <button class="outcome-btn" style="background:#1A7A40" onclick="doOutcome('${group.id}','correct')">
          ${copy.buttons.correct}<br><span style="font-size:10px;opacity:.8">${copy.points.correct}</span>
        </button>
        <button class="outcome-btn" style="background:#7A6A00" onclick="doOutcome('${group.id}','partial')">
          ${copy.buttons.partial}<br><span style="font-size:10px;opacity:.8">${copy.points.partial}</span>
        </button>
        <button class="outcome-btn" style="background:#7A1A1A" onclick="doOutcome('${group.id}','wrong')">

        <span class="g-label">${group.label}</span>
        <span class="g-div">${group.divisionName}</span>
        ${completed ? `<span class="completed-badge">${GC.uiCopy.completedBadge}</span>` : ''}

      ${inner}
    </div>`;
}

function renderStationScreen() {
  const station = stationById(activeStationId);
  const copy = GC.uiCopy;
  if (!station) return '';

  const question = station.questionId
    ? GC.stationQuestions.find(q => q.id === station.questionId)
    : null;

  let html = `<div id="station-screen">
    <div class="st-month">${station.month || ''}</div>
    <h2 class="st-name">${station.name}</h2>`;

  if (question) {
    html += `<p class="st-principle">${question.professionalPrinciple}</p>`;
    html += `
      <div class="q-box">
        <p class="q-text">${question.questionText}</p>
        <div class="timer-wrap">
          <div class="timer-display" id="timer-display" style="color:#1E1F56">${timerRemaining}</div>
          <button class="timer-btn" id="timer-btn"
            style="background:${timerRunning ? '#3A1A1A' : '#1A3A2A'};border-color:${timerRunning ? '#6A2A2A' : '#2A5A3A'};color:${timerRunning ? '#F0A0A0' : '#A0E0B0'}"
            onclick="toggleTimer(${question.timerSeconds})">
            ${timerRunning ? GC.uiCopy.timer.stop : timerRemaining < question.timerSeconds && timerRemaining > 0 ? GC.uiCopy.timer.resume : copy.buttons.startTimer}
          </button>
        </div>
      </div>
      ${lastOutcome ? renderOutcomeBanner(lastOutcome) : ''}
      <div class="cards-grid">`;

    GC.groups.forEach(g => {
      const ans = question.answersByGroup[g.id];
      const revealed = revealedGroups.has(g.id);
      const gst = gs(g.id);
      const completed = gst.completedStationIds.includes(activeStationId);
      const col = COLOR[g.colorToken];

      html += `
        <div class="g-card" style="border-top:4px solid ${col.primary}">
          <div class="g-card-header">
            <span class="g-label">${g.label}</span>
            <span class="g-div">${g.divisionName}</span>
            ${completed ? `<span class="completed-badge">${GC.uiCopy.completedBadge}</span>` : ''}
          </div>`;

      if (!revealed) {
        html += `<button class="reveal-btn" style="background:${col.primary}" onclick="revealGroup('${g.id}')">${copy.buttons.revealAnswer}</button>`;
      } else if (completed && !revealedGroups.has(g.id + '_outcome')) {
        html += `<p class="completed-note">${copy.messages.stationCompleted}</p>`;
      } else if (ans) {
        html += `
          <div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.taskLabel}</span><span class="ans-val">${ans.taskName}</span></div>
          <div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.whatIsWrongLabel}</span><span class="ans-val">${ans.whatIsWrong}</span></div>
          <div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.correctFixLabel}</span><span class="ans-fix">${ans.correctFix}</span></div>
          ${ans.facilitatorNotes ? `<div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.facilitatorNoteLabel}</span><span class="ans-val">${ans.facilitatorNotes}</span></div>` : ''}
          <div class="outcome-row">
            <button class="outcome-btn" style="background:#1A7A40" onclick="doOutcome('${g.id}','correct')">${copy.buttons.correct}</button>
            <button class="outcome-btn" style="background:#7A6A00" onclick="doOutcome('${g.id}','partial')">${copy.buttons.partial}</button>
            <button class="outcome-btn" style="background:#7A1A1A" onclick="doOutcome('${g.id}','wrong')">${copy.buttons.wrong}</button>
          </div>`;
      } else {
        html += `<p class="completed-note">${GC.uiCopy.messages.noGroupAnswer}</p>`;
      }

      html += `</div>`;
    });

    html += `</div>`;
  } else if (station.transitionMessageId && GC.transitionMessages[station.transitionMessageId]) {
    const tm = GC.transitionMessages[station.transitionMessageId];
    html += `
      <div class="transition-box">
        <div class="transition-title">${tm.title}</div>
        <p class="transition-body">${tm.body}</p>
      </div>`;
  } else {
    html += `<div class="transition-box"><p style="color:#667">${GC.uiCopy.messages.noStationQuestion}</p></div>`;
  }

  html += `</div>`;
  return html;
}

function openStation(stationId) {
  activeStationId = stationId;
  revealedGroups = new Set();
  softWarningGroup = null;
  lastOutcome = null;
  activeUEResult = null;
  stopTimer();
  const st = stationById(stationId);
  const q = st?.questionId ? GC.stationQuestions.find(q=>q.id===st.questionId) : null;
  timerRemaining = q ? q.timerSeconds : 60;
  renderApp();
}

function goBackToMap() {
  // Advance turn only when facilitator explicitly returns to map
  advanceTurn();
  activeStationId = null;
  lastOutcome = null;
  outcomePopupVisible = false;
  revealedGroups = new Set();
  stopTimer();
  renderApp();
}

function revealGroup(groupId) {
  const gst = gs(groupId);
  const st = stationById(activeStationId);
  const atStation = gst.currentStationOrder >= st.order;
  const completed = gst.completedStationIds.includes(activeStationId);
  if (!atStation && !completed) {
    softWarningGroup = groupId;
    renderApp();
    return;
  }
  revealedGroups.add(groupId);
  renderApp();
}

function dismissWarning() { softWarningGroup = null; renderApp(); }
function confirmWarning(gid) { softWarningGroup = null; revealedGroups.add(gid); renderApp(); }

function dismissOutcomePopup() {
  outcomePopupVisible = false;
  goBackToMap(); // return to map after acknowledging result
}

function doOutcome(groupId, outcome) {
  applyOutcome(groupId, activeStationId, outcome);
  revealedGroups.add(groupId + '_outcome');
  lastOutcome = { groupId, outcome, stayed: false };
  outcomePopupVisible = true;
  // Keep modal open only to show result — do NOT advance to next group automatically.
  // Facilitator sees the result, then clicks "חזרה למסלול" manually.
  // advanceTurn() already called inside applyOutcome — currentTurnGroupIndex updated,
  // but activeStationId stays set so modal remains visible with result.
  renderApp();
}

// Timer
function renderOutcomeBanner({ groupId, outcome }) {
  const group = GC.groups.find(g => g.id === groupId);
  const col = COLOR[group.colorToken];
  const msgKey = outcome === 'correct' ? 'correctOutcome'
               : outcome === 'partial' ? 'partialOutcome'
               : 'wrongOutcome';
  const rawMsg = GC.uiCopy.messages[msgKey];
  const msg = (outcome === 'wrong' && lastOutcome && lastOutcome.stayed)
    ? GC.uiCopy.messages.wrongOutcomeStayed
    : rawMsg;
  const template = GC.uiCopy.outcomeBanner[outcome];
  const text = template.replace('{group}', group.label).replace('{msg}', msg);
  const bg = outcome === 'correct' ? '#E8F5EE' : outcome === 'partial' ? '#FFF8DC' : '#FEE8EC';
  const border = outcome === 'correct' ? '#1A8A40' : outcome === 'partial' ? '#C09000' : '#C8102E';
  const textColor = outcome === 'correct' ? '#0D5A28' : outcome === 'partial' ? '#7A5800' : '#A0001A';
  return `<div style="
    background:${bg};
    border:1px solid ${border};
    border-right:4px solid ${col.primary};
    border-radius:8px;
    padding:12px 16px;
    margin-bottom:14px;
    font-size:14px;
    font-weight:600;
    color:${textColor};
    line-height:1.5;
  ">${text}</div>`;
}

function toggleTimer(totalSecs) {
  if (timerRunning) {
    stopTimer();
  } else {
    if (timerRemaining === 0) timerRemaining = totalSecs;
    timerRunning = true;
    timerInterval = setInterval(() => {
      timerRemaining--;
      if (timerRemaining <= 0) { timerRemaining = 0; stopTimer(); }
      const d = document.getElementById('timer-display');
      const b = document.getElementById('timer-btn');
      if (d) {
        d.textContent = timerRemaining;
        d.style.color = timerRemaining > 30 ? '#1E6A3A' : timerRemaining > 15 ? '#B07800' : '#C8102E';
      }
      if (b && timerRemaining === 0) {
        b.textContent = GC.uiCopy.buttons.startTimer;
        b.style.background = '#1A3A2A';
      }
    }, 1000);
    renderApp();
  }
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerRunning = false;
}

// ── Dev content review ──────────────────────────────────
function renderDevView(app) {
  function isMissing(v) {
    if (v === null || v === undefined) return true;
    const s = String(v);
    return s.includes('יושלם') || s.startsWith('TODO') || s === '';
  }
  function fv(v) {
    return isMissing(v)
      ? `<span style="background:#FEE8EC;color:#C8102E;font-weight:700;border-radius:3px;padding:1px 5px;font-size:11px">⚠ להשלמה</span>`
      : `<span>${v}</span>`;
  }
  let missing = 0;
  function fm(v) { if (isMissing(v)) missing++; return fv(v); }

  let body = '';

  // ── 1. Professional stations ─────────────────────────
  body += `<h3 style="font-size:12px;font-weight:700;color:#fff;background:#1E1F56;padding:6px 12px;border-radius:6px;margin:0 0 10px;letter-spacing:.04em">תחנות מקצועיות</h3>`;
  GC.stationQuestions.forEach(q => {
    const st = GC.stations.find(s => s.id === q.stationId);
    body += `<div style="border:1px solid #D0D4F0;border-radius:8px;overflow:hidden;margin-bottom:12px">
      <div style="background:#2A2E72;color:#fff;padding:6px 12px;font-size:12px;font-weight:700">${st?.month||''} — ${st?.name||q.stationId}</div>`;
    GC.groups.forEach(g => {
      const ans = q.answersByGroup[g.id];
      const c = COLOR[g.colorToken];
      body += `<div style="padding:7px 12px;border-bottom:1px solid #F0F2F8">
        <div style="font-size:10px;font-weight:700;color:${c.primary};margin-bottom:3px">${g.label} — ${g.divisionName}</div>
        <div style="font-size:11px;display:flex;flex-direction:column;gap:2px">
          <div><span style="color:#8A90C0">משימה: </span>${fm(ans?.taskName)}</div>
          <div><span style="color:#8A90C0">מה לא תקין: </span>${fm(ans?.whatIsWrong)}</div>
          <div><span style="color:#8A90C0">תיקון: </span>${fm(ans?.correctFix)}</div>
        </div>
      </div>`;
    });
    body += `</div>`;
  });

  // ── 2. Unexpected events ─────────────────────────────
  body += `<h3 style="font-size:12px;font-weight:700;color:#fff;background:#C05C1A;padding:6px 12px;border-radius:6px;margin:16px 0 10px;letter-spacing:.04em">⚡ תחנות בלת"מ</h3>`;
  GC.stations.filter(s => s.type === 'unexpected_event').forEach(s => {
    const ueSet = GC.unexpectedEvents[s.unexpectedEventSetId] || [];
    body += `<div style="border:1px solid #E0C8A0;border-radius:8px;overflow:hidden;margin-bottom:10px">
      <div style="background:#FFF3E0;padding:6px 12px;font-size:11px;font-weight:700;color:#7A3A00">${s.month} — ${s.name}</div>`;
    ueSet.forEach(e => {
      body += `<div style="padding:6px 12px;border-bottom:1px solid #F0E8D8;font-size:11px">
        <strong>${e.label}:</strong> ${e.description}
        &nbsp;·&nbsp;<span style="color:#7A5A20">המתנה: ${fm(e.waitRounds)} סבבים</span>
      </div>`;
    });
    body += `</div>`;
  });

  // ── 3. Compensation models ───────────────────────────
  body += `<h3 style="font-size:12px;font-weight:700;color:#fff;background:#1A6A3A;padding:6px 12px;border-radius:6px;margin:16px 0 10px;letter-spacing:.04em">מודל תגמול</h3>`;
  GC.groups.forEach(g => {
    const comp = GC.compensationModels[g.id];
    const c = COLOR[g.colorToken];
    body += `<div style="border:1px solid ${c.primary}55;border-radius:8px;overflow:hidden;margin-bottom:10px">
      <div style="background:${c.primary};color:#fff;padding:6px 12px;font-size:12px;font-weight:700">${g.label} — ${comp?.modelName||''}</div>
      <div style="padding:8px 12px;font-size:11px;display:flex;flex-direction:column;gap:2px">
        <div><span style="color:#8A90C0">מדד תגמול: </span>${fm(comp?.rewardMetric)}</div>
        <div><span style="color:#8A90C0">נוסחה: </span>${fm(comp?.formula)}</div>
        <div><span style="color:#8A90C0">משקל: </span>${fm(comp?.weight)}</div>
        <div><span style="color:#8A90C0">ספי ביצוע: </span>${fm(comp?.performanceThresholds)}</div>
        <div><span style="color:#8A90C0">מקור נתונים: </span>${fm(comp?.dataSource)}</div>
      </div>
    </div>`;
  });

  // ── 4. Visible tasks ─────────────────────────────────
  body += `<h3 style="font-size:12px;font-weight:700;color:#fff;background:#2A2E72;padding:6px 12px;border-radius:6px;margin:16px 0 10px;letter-spacing:.04em">משימות גלויות</h3>`;
  GC.groups.forEach(g => {
    const tasks = GC.visibleTasks[g.id] || [];
    const c = COLOR[g.colorToken];
    body += `<div style="border:1px solid ${c.primary}55;border-radius:8px;overflow:hidden;margin-bottom:12px">
      <div style="background:${c.primary};color:#fff;padding:6px 12px;font-size:12px;font-weight:700">${g.label} — ${g.divisionName}</div>`;
    tasks.forEach(t => {
      body += `<div style="padding:8px 12px;border-bottom:1px solid #F0F2F8">
        <div style="font-size:12px;font-weight:700;color:#1A1C50;margin-bottom:4px">${t.taskName}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 16px;font-size:11px">
          <div><span style="color:#8A90C0">מטרת חברה: </span>${fm(t.companyGoal)}</div>
          <div><span style="color:#8A90C0">יעד: </span>${fm(t.goal)}</div>
          <div><span style="color:#8A90C0">מדד תוצאה: </span>${fm(t.outcomeMetric)}</div>
          <div><span style="color:#8A90C0">תיאור משימה: </span>${fm(t.taskDescription)}</div>
          <div><span style="color:#8A90C0">הישג שנתי: </span>${fm(t.annualAchievement)}</div>
          <div><span style="color:#8A90C0">סוג מדד תפוקה: </span>${fm(t.outputMetricType)}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:5px;font-size:11px">
          ${['Q1','Q2','Q3','Q4'].map(q=>`<div><strong style="color:#4A50A0">${q}:</strong> ${fm(t.milestones[q])}</div>`).join('')}
        </div>
      </div>`;
    });
    body += `</div>`;
  });

  // ── 5. End screen ────────────────────────────────────
  const es = GC.uiCopy.endScreen;
  body += `<h3 style="font-size:12px;font-weight:700;color:#fff;background:#6B3FA0;padding:6px 12px;border-radius:6px;margin:16px 0 10px;letter-spacing:.04em">מסך סיום</h3>
    <div style="border:1px solid #D0C0F0;border-radius:8px;padding:10px 12px;font-size:11px;margin-bottom:32px;display:flex;flex-direction:column;gap:3px">
      <div><span style="color:#8A90C0">שאלת התחייבות: </span>${es.commitmentQuestion}</div>
      <div><span style="color:#8A90C0">Mentimeter URL: </span>${fm(es.mentimeterUrl)}</div>
    </div>`;

  const badge = missing > 0
    ? `<span style="background:#C8102E;color:#fff;border-radius:10px;padding:4px 14px;font-size:13px;font-weight:700">${missing} שדות לא מלאים</span>`
    : `<span style="background:#1A6A3A;color:#fff;border-radius:10px;padding:4px 14px;font-size:13px;font-weight:700">✓ הכל מלא</span>`;

  app.innerHTML = `<div id="board-wrap" style="padding:16px 20px;direction:rtl;max-width:860px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:18px;font-weight:800;color:#1E1F56">📋 סקירת תוכן — מצב פיתוח</div>
        <div style="font-size:12px;color:#8A90C0;margin-top:2px">שדות <span style="background:#FEE8EC;color:#C8102E;font-weight:700;border-radius:3px;padding:1px 4px;font-size:11px">⚠ להשלמה</span> דורשים תיאום עם הלקוחה</div>
      </div>
      ${badge}
    </div>
    ${body}
  </div>`;
}

// ── Mobile ──────────────────────────────────────────────
let mobileSplashDone = {};

function renderMobile(app, groupId) {
  const group = GC.groups.find(g => g.id === groupId) || GC.groups[0];
  const col = COLOR[group.colorToken];

  app.innerHTML = `<div id="mobile-wrap" dir="rtl"></div>`;
  const wrap = document.getElementById('mobile-wrap');

  // Lock folder if another group is currently playing
  const currentGroup = GC.groups[currentTurnGroupIndex];
  const isLocked = !DEV_MODE && !facilitatorPreview && gameStarted && group.id !== currentGroup.id;

  if (isLocked) {
    renderFolderLocked(wrap, group, col, currentGroup);
    return;
  }

  if (!mobileSplashDone[groupId]) {
    renderSplash(wrap, group, col);
  } else {
    renderFolder(wrap, group, col);
  }
}

function renderFolderLocked(wrap, group, col, currentGroup) {
  const msg = GC.uiCopy.mobileFolder.lockedMessage
    .replace('{group}', currentGroup.label);
  wrap.innerHTML = `
    <div class="splash-bar" style="background:${col.primary}"></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:32px 24px;gap:20px;background:#F5F7FA;min-height:100vh">
      <div style="font-size:48px">🔒</div>
      <div style="font-size:16px;font-weight:700;color:#1A2A3A;text-align:center">${msg}</div>
      <p style="font-size:13px;color:#666;text-align:center;line-height:1.6;max-width:260px">
        ${GC.uiCopy.mobileFolder.lockedWait}
      </p>
    </div>`;
}

function renderSplash(wrap, group, col) {
  const copy = GC.uiCopy;
  wrap.innerHTML = `
    <div class="splash-bar" style="background:${col.primary}"></div>
    <div class="splash">
      <div class="splash-logo">
        <div class="splash-logo-line"></div>
        <span class="splash-logo-text" style="color:${col.primary}">${copy.appTitle}</span>
        <div class="splash-logo-line"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <span class="splash-badge" style="background:${col.primary}">${group.label}</span>
        <span class="splash-div">${group.divisionName}</span>
      </div>
      <div class="splash-intro-card">
        <p>${copy.messages.mobileIntro}</p>
      </div>
      <button class="splash-btn" style="background:${col.primary}"
        onclick="startFolder('${group.id}')">
        ${copy.buttons.openFolder}
      </button>
    </div>`;
}

function startFolder(groupId) {
  mobileSplashDone[groupId] = true;
  renderApp();
}

let activeTab = {};
let openTasks = {};
let reminderOpen = {};

function renderFolder(wrap, group, col) {
  const copy = GC.uiCopy;
  const gid = group.id;
  const tab = activeTab[gid] || 'tasks';
  const tasks = GC.visibleTasks[gid] || [];
  const comp = GC.compensationModels[gid];
  const reminders = GC.reminderDefinitions;

  wrap.innerHTML = `
    <div class="m-header" style="border-bottom:3px solid ${col.primary}">
      <div class="m-header-top">
        <span class="m-badge" style="background:${col.primary}">${group.label}</span>
        <span class="m-div-name">${group.divisionName}</span>
      </div>
      <div class="m-title">${copy.appTitle}</div>
    </div>
    <div class="m-tabs">
      <button class="m-tab" style="border-bottom:3px solid ${tab==='tasks' ? col.primary : 'transparent'};
        color:${tab==='tasks' ? col.text : '#666'};font-weight:${tab==='tasks' ? 700:400}"
        onclick="switchTab('${gid}','tasks')">${copy.tabs.reviewTasks}</button>
      <button class="m-tab" style="border-bottom:3px solid ${tab==='compensation' ? col.primary : 'transparent'};
        color:${tab==='compensation' ? col.text : '#666'};font-weight:${tab==='compensation' ? 700:400}"
        onclick="switchTab('${gid}','compensation')">${copy.tabs.compensationModel}</button>
    </div>
    <div class="m-content">
      ${tab === 'tasks' ? renderTasksList(tasks, col, gid) : renderCompCard(comp, col, gid)}
    </div>
    <div class="reminder-bar">
      <button class="reminder-btn" style="color:${col.primary};border-color:${col.primary}"
        onclick="toggleReminder('${gid}')">${copy.buttons.needReminder}</button>
    </div>
    ${reminderOpen[gid] ? renderReminderDrawer(reminders, col, gid) : ''}`;
}

function renderTasksList(tasks, col, gid) {
  if (!tasks || tasks.length === 0) {
    return `<div style="padding:20px 4px;color:#8A9AAA;font-size:13px;line-height:1.6">
      ${GC.uiCopy.messages.mobileTasksFallback}
    </div>`;
  }
  return `<div class="task-list">
    ${tasks.map(t => renderTaskCard(t, col, gid)).join('')}
  </div>`;
}

function renderTaskCard(task, col, gid) {
  const open = !!(openTasks[gid] && openTasks[gid][task.taskId]);
  // Dev: set of intentionally-wrong field names for this task
  const errs = (DEV_MODE && task.devErrors) ? new Set(task.devErrors) : new Set();
  // Wrap a value: orange+⚠️ if intentional error, red if יושלם placeholder, else plain
  const dv = (v, field) => {
    if (errs.has(field)) return `<span style="background:#FFF3CD;color:#7A5000;font-weight:700;padding:0 4px;border-radius:3px;border-bottom:2px solid #E07000">⚠️ ${v}</span>`;
    return devStyleVal(v);
  };
  const classLabel = task.classification === 'top10' ? GC.uiCopy.classificationLabels.top10 : GC.uiCopy.classificationLabels.routine;
  const nameDisplay = errs.has('taskName')
    ? `<span style="background:#FFF3CD;color:#7A5000;font-weight:700;padding:0 4px;border-radius:3px;border-bottom:2px solid #E07000">⚠️ ${task.taskName}</span>`
    : task.taskName;
  const milestonesErr = errs.has('milestones');
  return `
    <div class="t-card" style="border-right:3px solid ${col.primary}">
      <button class="t-card-header" onclick="toggleTask('${gid}','${task.taskId}')">
        <span class="t-card-name">${nameDisplay}</span>
        <span class="chevron" style="transform:rotate(${open?180:0}deg)">▾</span>
      </button>
      ${open ? `
        <div class="t-card-body">
          <div class="t-section">
            <div class="t-section-title" style="color:${col.primary}">${GC.uiCopy.taskSections.strategic}</div>
            <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.companyGoal}</span><span class="f-val">${dv(task.companyGoal,'companyGoal')}</span></div>
            <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.goal}</span><span class="f-val">${dv(task.goal,'goal')}</span></div>
            <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.outcomeMetric}</span><span class="f-val">${dv(task.outcomeMetric,'outcomeMetric')}</span></div>
            <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.classification}</span><span class="f-val">${dv(classLabel,'classification')}</span></div>
          </div>
          <div class="t-divider"></div>
          <div class="t-section">
            <div class="t-section-title" style="color:${col.primary}">${GC.uiCopy.taskSections.details}</div>
            <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.taskDescription}</span><span class="f-val">${dv(task.taskDescription,'taskDescription')}</span></div>
            <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.annualAchievement}</span><span class="f-val">${dv(task.annualAchievement,'annualAchievement')}</span></div>
            <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.outputMetricType}</span><span class="f-val">${dv(task.outputMetricType,'outputMetricType')}</span></div>
          </div>
          <div class="t-divider"></div>
          <div class="t-section"${milestonesErr ? ' style="border:1.5px solid #E07000;border-radius:6px;padding:6px;background:#FFFBF0"' : ''}>
            <div class="t-section-title" style="color:${col.primary}">${GC.uiCopy.taskSections.planning}${milestonesErr ? ' <span style="color:#E07000;font-size:13px">⚠️</span>' : ''}</div>
            <div class="milestones-grid">
              ${['Q1','Q2','Q3','Q4'].map(q => `
                <div class="m-cell">
                  <div class="m-q" style="background:${col.primary}">${q}</div>
                  <div class="m-v">${milestonesErr
                    ? `<span style="background:#FFF3CD;color:#7A5000;font-weight:700;padding:0 2px;border-radius:3px">⚠️ ${task.milestones[q]}</span>`
                    : devStyleVal(task.milestones[q])}</div>
                </div>`).join('')}
            </div>
          </div>
          ${DEV_MODE && task.devHint ? (() => {
            const FIELD_TO_QID = {
              taskName: 'q_measurable', companyGoal: 'q_company_goal', goal: 'q_company_goal',
              outcomeMetric: 'q_outcome_metric', classification: 'q_top10',
              annualAchievement: 'q_measurable', outputMetricType: 'q_output_metric',
              milestones: 'q_milestones'
            };
            const QID_LABELS = {
              q_company_goal: 'מטרת חברה ויעד',
              q_outcome_metric: 'מדד תוצאה',
              q_top10: 'Top 10 / שוטפת',
              q_measurable: 'ניסוח מדיד',
              q_output_metric: 'מדד תפוקה',
              q_milestones: 'אבני דרך רבעוניות'
            };
            const uniqueQids = [...new Set((task.devErrors || []).map(f => FIELD_TO_QID[f]).filter(Boolean))];
            const stationsHtml = uniqueQids.map(qid => {
              const q = GC.stationQuestions.find(sq => sq.id === qid);
              if (!q) return '';
              const ans = q.answersByGroup ? q.answersByGroup[gid] : null;
              return `<div style="margin-top:6px;padding:6px 8px;background:#FFF8E1;border-radius:4px;border-right:2px solid #C8920A">
                <div style="font-weight:700;color:#5D4000;margin-bottom:3px">📍 תחנה: ${QID_LABELS[qid] || qid}</div>
                <div style="color:#6B4D00;margin-bottom:2px"><strong>שאלה:</strong> ${q.questionText}</div>
                ${ans ? `<div style="color:#7A3000;margin-bottom:2px"><strong>מה שגוי:</strong> ${ans.whatIsWrong}</div>
                <div style="color:#2D5A00"><strong>תיקון:</strong> ${ans.correctFix}</div>` : ''}
              </div>`;
            }).join('');
            return `<div style="margin-top:8px;padding:8px 10px;background:#FFF3CD;border-radius:6px;border-right:3px solid #E0A020;font-size:11px;color:#7A5000;line-height:1.6;direction:rtl">
              <strong>⚠️ טעות מוטמנת</strong>
              ${stationsHtml}
            </div>`;
          })() : ''}
        </div>` : ''}
    </div>`;
}

function renderCompCard(comp, col, gid) {
  if (!comp) return '<p style="color:#888;padding:12px">' + GC.uiCopy.messages.mobileNoCompensation + '</p>';
  const errs = (DEV_MODE && comp.devErrors) ? new Set(comp.devErrors) : new Set();
  const dv = (v, field) => {
    if (errs.has(field)) return `<span style="background:#FFF3CD;color:#7A5000;font-weight:700;padding:0 4px;border-radius:3px;border-bottom:2px solid #E07000">⚠️ ${v}</span>`;
    return devStyleVal(v);
  };
  const devBox = DEV_MODE && comp.devHint ? (() => {
    const FIELD_TO_QID = {
      rewardMetric: 'q_reward_metric', formula: 'q_reward_metric',
      weight: 'q_weight', performanceThresholds: 'q_weight'
    };
    const QID_LABELS = {
      q_reward_metric: 'מדד תגמול ונוסחה',
      q_weight: 'משקולות וספי ביצוע'
    };
    const uniqueQids = [...new Set((comp.devErrors || []).map(f => FIELD_TO_QID[f]).filter(Boolean))];
    const stationsHtml = uniqueQids.map(qid => {
      const q = GC.stationQuestions.find(sq => sq.id === qid);
      if (!q) return '';
      const ans = q.answersByGroup ? q.answersByGroup[gid] : null;
      return `<div style="margin-top:6px;padding:6px 8px;background:#FFF8E1;border-radius:4px;border-right:2px solid #C8920A">
        <div style="font-weight:700;color:#5D4000;margin-bottom:3px">📍 תחנה: ${QID_LABELS[qid] || qid}</div>
        <div style="color:#6B4D00;margin-bottom:2px"><strong>שאלה:</strong> ${q.questionText}</div>
        ${ans ? `<div style="color:#7A3000;margin-bottom:2px"><strong>מה שגוי:</strong> ${ans.whatIsWrong}</div>
        <div style="color:#2D5A00"><strong>תיקון:</strong> ${ans.correctFix}</div>` : ''}
      </div>`;
    }).join('');
    return `<div style="margin-top:8px;padding:8px 10px;background:#FFF3CD;border-radius:6px;border-right:3px solid #E0A020;font-size:11px;color:#7A5000;line-height:1.6;direction:rtl">
      <strong>⚠️ טעות מוטמנת</strong>
      ${stationsHtml}
    </div>`;
  })() : '';
  return `<div class="comp-card">
    <div class="comp-title" style="color:${col.primary}">${comp.modelName}</div>
    <div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.rewardMetric}</span><span class="f-val">${dv(comp.rewardMetric,'rewardMetric')}</span></div>
    <div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.formula}</span><span class="f-val">${dv(comp.formula,'formula')}</span></div>
    <div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.weight}</span><span class="f-val">${dv(comp.weight,'weight')}</span></div>
    <div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.performanceThresholds}</span><span class="f-val">${dv(comp.performanceThresholds,'performanceThresholds')}</span></div>
    ${comp.dataSource ? `<div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.dataSource}</span><span class="f-val">${dv(comp.dataSource,'dataSource')}</span></div>` : ''}
    ${devBox}
  </div>`;
}

function renderReminderDrawer(defs, col, gid) {
  const copy = GC.uiCopy;
  return `
    <div class="drawer-overlay" onclick="toggleReminder('${gid}')"></div>
    <div class="drawer">
      <div class="drawer-handle" style="background:${col.primary}"></div>
      <div class="drawer-title">${GC.uiCopy.reminderDrawer.title}</div>
      ${defs.map(d => `
        <div class="def-row">
          <span class="def-term" style="color:${col.primary}">${d.term}</span>
          <span class="def-def">${d.definition}</span>
        </div>`).join('')}
      <button class="drawer-close" style="color:${col.primary};border-color:${col.primary}"
        onclick="toggleReminder('${gid}')">${copy.buttons.cancel}</button>
    </div>`;
}

function spinWheel(groupId, ueSetId) {
  const ueSet = GC.unexpectedEvents[ueSetId] || [];
  const idx = Math.floor(Math.random() * ueSet.length);
  activeUEResult = ueSet[idx];
  gs(groupId).usedUnexpectedEventIds.push(activeUEResult.resultId);
  renderApp();
}

function doUEOutcome(groupId, waitRounds) {
  const g = gs(groupId);
  const st = stationById(activeStationId);
  if (!g.completedStationIds.includes(activeStationId))
    g.completedStationIds.push(activeStationId);
  g.playedThisRound = true;
  if (waitRounds > 0) {
    g.waitingOneRound = true;
  } else {
    g.currentStationOrder = st.order + 1;
  }
  activeUEResult = null;
  goBackToMap();
}

function switchTab(gid, tab) { activeTab[gid] = tab; renderApp(); }
function toggleTask(gid, taskId) {
  if (!openTasks[gid]) openTasks[gid] = {};
  openTasks[gid][taskId] = !openTasks[gid][taskId];
  renderApp();
}
function toggleReminder(gid) { reminderOpen[gid] = !reminderOpen[gid]; renderApp(); }

// ── Init ────────────────────────────────────────────────
// DEV_MODE active — free navigation enabled via ?devmode=true

// Populate nav labels from GC
document.getElementById('nav-label').textContent = GC.uiCopy.nav.screenLabel;
document.getElementById('page-title').textContent = GC.uiCopy.pageTitle;
document.getElementById('nav-fac-lbl').textContent = GC.uiCopy.nav.facilitator;
GC.groups.forEach((g, i) => {
  const el = document.getElementById('nav-g' + (i+1) + '-lbl');
  if (el) el.textContent = GC.uiCopy.nav.mobile_group
    .replace('{n}', i+1)
    .replace('{division}', g.divisionName);
});
renderApp();
</script>
</body>
</html>
