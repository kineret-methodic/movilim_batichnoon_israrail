<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title"></title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;direction:rtl}
  body{font-family:'Heebo','Arial',sans-serif;background:#D6D6D6;color:#1A1C50;-webkit-font-smoothing:antialiased}
  @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(0,174,255,.5)}70%{box-shadow:0 0 0 18px rgba(0,174,255,0)}100%{box-shadow:0 0 0 0 rgba(0,174,255,0)}}

  /* ── Nav bar ── */
  #nav{position:fixed;top:0;right:0;left:0;background:#1E1F56;
    padding:6px 14px;display:flex;gap:6px;z-index:999;align-items:center;flex-wrap:wrap;
    border-bottom:3px solid #F5C800}
  #nav span{color:#A0A8D8;font-size:11px;padding:4px 6px}
  .nav-btn{color:#C8CEF0;font-size:12px;padding:4px 10px;border-radius:4px;
    border:1px solid #3A3E88;cursor:pointer;background:none;font-family:inherit;white-space:nowrap}
  .nav-btn:hover{background:#2A2E72}
  .nav-btn.active{background:#F5C800;color:#000000;border-color:#F5C800;font-weight:700}

  /* ── Main layout ── */
  #app{height:100vh;display:flex;flex-direction:column}

  /* ── Facilitator header ── */
  .f-header{background:#1E1F56;padding:10px 20px;
    display:flex;align-items:center;gap:14px;flex-shrink:0;
    border-bottom:1px solid #2E3080}
  .f-title{font-size:18px;font-weight:800;letter-spacing:.02em;color:#FFFFFF}
  .f-sub{font-size:11px;color:#8A92CC;flex:1}
  .f-turn-indicator{font-size:13px;font-weight:700;color:#F5C800;
    flex:1;text-align:center;letter-spacing:.01em}
  .back-btn{background:#2A2E72;border:1px solid #3A3E88;color:#C8CEF0;border-radius:6px;
    padding:6px 14px;cursor:pointer;font-size:12px;font-family:inherit}
  .back-btn:hover{background:#3A3E88}

  /* ── Board map ── */
  #board-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 16px;
    background:radial-gradient(ellipse at 50% 30%,#ffffff 10%,#e0e0e0 100%);
    display:flex;flex-direction:column;gap:6px}

  /* Section labels */
  .bsl{display:flex;justify-content:space-between;align-items:center;
    padding:0 2px;margin-top:4px}
  .bsl span:first-child{font-size:11px;font-weight:600;color:#1E1F56}
  .bsl-months{font-size:10px;color:#8A90C0}

  /* Board rows */
  .board-row{display:flex;align-items:center;gap:0;flex-wrap:nowrap;
    justify-content:center;
    background:transparent;border-radius:12px;padding:8px 10px;
    overflow-x:auto}
  .row-ltr{flex-direction:row-reverse}

  /* Arrow between stations */
  .row-arr{font-size:14px;color:#B0B4D8;flex-shrink:0;padding:0 4px;line-height:1}

  /* Connector between rows */
  .board-conn{display:flex;flex-direction:column;align-items:flex-end;padding-right:24px;height:24px;position:relative}
  .board-conn.left{align-items:flex-start;padding-left:24px;padding-right:0}
  .board-conn.right{align-items:flex-end}
  .conn-v{width:1.5px;background:#B0B4D8;flex:1}
  .conn-a{font-size:14px;color:#B0B4D8;line-height:1}

  /* Station node */
  /* ── Station circles (new design) ── */
  .sn{width:108px;height:108px;border-radius:50%;background:#FFFFFF;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    flex-shrink:0;text-align:center;padding:6px 8px;
    box-shadow:0 3px 10px rgba(0,0,0,.18);
    transition:transform .15s,box-shadow .15s;
    position:relative;overflow:visible}
  .sn.sn-active{cursor:pointer}
  .sn.sn-active:hover{transform:scale(1.07);box-shadow:0 6px 18px rgba(0,0,0,.26)}
  .sn-locked{opacity:0.28;pointer-events:none}
  .sn-month{font-size:8px;font-weight:700;letter-spacing:.02em;line-height:1;margin-bottom:3px}
  .sn-name{font-size:9.5px;font-weight:800;line-height:1.25;padding:0 6px;margin-top:3px}
  .sn-toks{display:flex;justify-content:center;gap:4px;position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);white-space:nowrap}
  .sn-tok{width:10px;height:10px;border-radius:50%;border:2px solid #FFFFFF;display:inline-block;box-shadow:0 1px 4px rgba(0,0,0,.3)}

  /* keep old .token for status bar */
  .token{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.7);display:inline-block}

  /* ── Facilitator preview mode ── */
  .preview-btn{background:none;border:1.5px solid #3A3E88;border-radius:6px;
    color:#A0A8D8;font-size:18px;width:34px;height:34px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:background .15s,border-color .15s;line-height:1}
  .preview-btn:hover{background:#2A2E72;border-color:#6A70C0}
  .preview-btn.active{background:#1A6A3A;border-color:#2AA060;color:#FFFFFF;
    box-shadow:0 0 8px rgba(26,160,80,.5)}
  .preview-badge{background:#1A6A3A;color:#FFFFFF;font-size:11px;font-weight:700;
    padding:4px 10px;border-radius:12px;letter-spacing:.03em;
    animation:previewPulse 2.5s ease-in-out infinite}
  @keyframes previewPulse{0%,100%{opacity:1}50%{opacity:.7}}

  /* ── Outcome popup ── */
  .outcome-popup-overlay{position:fixed;inset:0;background:rgba(10,12,50,.72);
    z-index:900;display:flex;align-items:center;justify-content:center;padding:20px}
  .outcome-popup{background:#fff;border-radius:18px;padding:32px 28px;max-width:400px;
    width:100%;text-align:center;box-shadow:0 12px 48px rgba(10,12,50,.4);
    animation:popIn .22s cubic-bezier(.34,1.56,.64,1)}
  @keyframes popIn{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
  .outcome-popup-icon{font-size:52px;line-height:1;margin-bottom:8px}
  .outcome-popup-title{font-size:22px;font-weight:800;margin-bottom:6px}
  .outcome-popup-points{font-size:32px;font-weight:800;margin:10px 0}
  .outcome-popup-msg{font-size:14px;line-height:1.6;color:#4A4E7A;margin-bottom:24px}
  .outcome-popup-btn{background:#1E1F56;color:#fff;border:none;border-radius:10px;
    padding:13px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
    transition:background .15s}
  .outcome-popup-btn:hover{background:#2E2F80}


  /* ── Status bar ── */
  #status-bar{background:#1E1F56;display:flex;flex-shrink:0;border-top:2px solid #F5C800}
  .status-item{flex:1;padding:7px 10px;border-left:1px solid #2E3080;display:flex;flex-direction:column;gap:2px}
  .s-grp{font-size:12px;font-weight:700;color:#FFFFFF}
  .s-div{font-size:9px;color:#7A80C0}
  .s-pos{font-size:10px;color:#C8CEF0}
  .s-err{font-size:10px;color:#F5C800}
  .auto-tag{font-size:9px;background:#2A3A18;color:#80D050;border-radius:3px;
    padding:1px 4px;align-self:flex-start;margin-top:1px}

  /* ── Station screen ── */
  #station-screen{flex:1;overflow-y:auto;padding:18px 22px;background:#F0F2F7}
  .st-month{font-size:11px;color:#6A70B0;margin-bottom:4px}
  .st-name{font-size:24px;font-weight:800;color:#1E1F56;margin-bottom:8px}
  .st-principle{font-size:13px;color:#5A60A0;font-style:italic;line-height:1.6;
    padding-bottom:14px;border-bottom:2px solid #D8DAF0;margin-bottom:16px}

  /* ── Question box ── */
  .q-box{background:#FFFFFF;border:1px solid #D0D4F0;border-right:4px solid #1E1F56;
    border-radius:10px;padding:16px 18px;margin-bottom:18px;
    display:flex;gap:18px;align-items:flex-start;
    box-shadow:0 1px 4px rgba(30,31,86,.08)}
  .q-text{flex:1;font-size:15px;color:#1A1C50;line-height:1.7;font-weight:500}

  /* ── Timer ── */
  .timer-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
  .timer-display{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;
    min-width:52px;text-align:center;color:#1E1F56}
  .timer-btn{border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;
    font-family:inherit;font-weight:700;border:1px solid;white-space:nowrap}

  /* ── Group cards ── */
  .cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .g-card{background:#FFFFFF;border-radius:10px;padding:14px;
    border:1px solid #D0D4F0;box-shadow:0 1px 4px rgba(30,31,86,.07)}
  .g-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .g-label{font-weight:700;font-size:13px;color:#1E1F56}
  .g-div{font-size:11px;color:#7A80C0;flex:1}
  .completed-badge{font-size:9px;background:#E8F5EE;color:#1A6A3A;border-radius:4px;
    padding:2px 5px;border:1px solid #A8D8B8}
  .reveal-btn{width:100%;padding:9px;border:none;border-radius:7px;color:#fff;
    font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .reveal-btn:hover{opacity:.88}

  /* ── Answer block ── */
  .ans-row{display:flex;gap:8px;margin-bottom:7px;font-size:12px;line-height:1.5}
  .ans-lbl{color:#6A70B0;font-weight:700;min-width:86px;flex-shrink:0}
  .ans-val{color:#1A1C50}
  .ans-fix{color:#1A6A3A;font-weight:600}
  .outcome-row{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
  .outcome-btn{flex:1;min-width:76px;padding:7px 4px;border:none;border-radius:7px;
    color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1.3}
  .outcome-btn:hover{opacity:.88}
  .completed-note{font-size:11px;color:#7A80C0;font-style:italic;padding:8px 0}

  /* ── Transition box ── */
  .transition-box{background:#FFFFFF;border:2px solid #1E1F56;
    border-radius:12px;padding:28px 24px;text-align:center;
    max-width:520px;margin:0 auto;box-shadow:0 2px 12px rgba(30,31,86,.1)}
  .transition-title{font-size:22px;font-weight:800;color:#1E1F56;margin-bottom:12px}
  .transition-body{font-size:15px;color:#3A3E78;line-height:1.7}

  /* ── Soft warning modal ── */
  .overlay{position:fixed;inset:0;background:rgba(30,31,86,.5);display:flex;
    align-items:center;justify-content:center;z-index:500}
  .modal{background:#FFFFFF;border:2px solid #1E1F56;border-radius:12px;
    padding:26px 28px;max-width:400px;text-align:center;
    box-shadow:0 4px 24px rgba(30,31,86,.2)}
  .modal p{font-size:14px;color:#2A2E72;line-height:1.6;margin-bottom:18px}
  .modal-btns{display:flex;gap:10px;justify-content:center}
  .btn-sec{background:#F0F2F7;border:1px solid #C0C4E8;color:#3A3E78;border-radius:7px;
    padding:8px 18px;cursor:pointer;font-size:12px;font-family:inherit}
  .btn-danger{background:#C8102E;border:1px solid #A00820;color:#FFFFFF;border-radius:7px;
    padding:8px 18px;cursor:pointer;font-size:12px;font-family:inherit}

  /* ── Mobile ── */
  #mobile-wrap{height:calc(100vh - 40px);overflow-y:auto;background:#F5F7FA;
    color:#1A2A3A;max-width:440px;margin:0 auto;font-family:'Heebo','Arial',sans-serif;
    display:flex;flex-direction:column}
  .splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 24px;gap:22px}
  .splash-bar{height:6px;flex-shrink:0;width:100%}
  .splash-logo{display:flex;align-items:center;gap:10px;width:100%}
  .splash-logo-line{flex:1;height:1px;background:#D0D8E0}
  .splash-logo-text{font-size:19px;font-weight:800;letter-spacing:.04em;white-space:nowrap}
  .splash-badge{color:#fff;border-radius:18px;padding:5px 18px;font-size:14px;font-weight:700}
  .splash-div{font-size:15px;color:#444;font-weight:500}
  .splash-intro-card{background:#fff;border-radius:11px;padding:16px 18px;
    box-shadow:0 1px 8px rgba(0,0,0,.08);width:100%}
  .splash-intro-card p{font-size:13px;color:#555;line-height:1.7;margin:0}
  .splash-btn{width:100%;padding:13px;border:none;border-radius:10px;color:#fff;
    font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .m-header{background:#fff;padding:13px 15px 11px;flex-shrink:0}
  .m-header-top{display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .m-badge{color:#fff;border-radius:11px;padding:2px 10px;font-size:11px;font-weight:700}
  .m-div-name{font-size:12px;color:#666;font-weight:500}
  .m-title{font-size:17px;font-weight:800;color:#1A2A3A;letter-spacing:.02em}
  .m-tabs{background:#fff;display:flex;border-bottom:1px solid #E0E8F0;flex-shrink:0}
  .m-tab{flex:1;padding:11px 8px;border:none;background:none;font-size:12px;
    cursor:pointer;font-family:inherit;transition:color .15s}
  .m-content{flex:1;overflow-y:auto;padding:10px 11px 80px}
  .task-list{display:flex;flex-direction:column;gap:9px}
  .t-card{background:#fff;border-radius:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .t-card-header{width:100%;background:none;border:none;display:flex;align-items:center;
    justify-content:space-between;padding:13px 13px;cursor:pointer;font-family:inherit;text-align:right}
  .t-card-name{font-size:13px;font-weight:600;color:#1A2A3A;flex:1}
  .chevron{font-size:13px;color:#AAB8C8;transition:transform .2s;flex-shrink:0}
  .t-card-body{padding:0 13px 14px;border-top:1px solid #F0F4F8}
  .t-section{padding-top:10px}
  .t-section-title{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .t-divider{height:1px;background:#F0F4F8;margin:4px 0}
  .f-row{display:flex;gap:7px;margin-bottom:7px;align-items:flex-start}
  .f-lbl{font-size:11px;color:#7A8A9A;font-weight:600;flex-shrink:0;min-width:100px;padding-top:1px}
  .f-val{font-size:12px;color:#2A3A4A;line-height:1.5;flex:1}
  .milestones-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
  .m-cell{display:flex;flex-direction:column;gap:3px}
  .m-q{color:#fff;border-radius:4px;padding:2px;font-size:10px;font-weight:700;text-align:center}
  .m-v{font-size:10px;color:#4A5A6A;line-height:1.4}
  .comp-card{background:#fff;border-radius:9px;padding:16px 14px;
    box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:9px}
  .comp-title{font-size:15px;font-weight:700;margin-bottom:3px}
  .reminder-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid #E0E8F0;
    padding:9px 14px;display:flex;justify-content:center}
  .reminder-btn{background:none;border:1px solid;border-radius:18px;padding:5px 18px;
    font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100}
  .drawer{position:fixed;bottom:0;right:0;left:0;background:#fff;border-radius:14px 14px 0 0;
    padding:14px 18px 28px;z-index:101;max-width:440px;margin:0 auto;
    box-shadow:0 -4px 24px rgba(0,0,0,.15)}
  .drawer-handle{width:38px;height:4px;border-radius:2px;margin:0 auto 14px}
  .drawer-title{font-size:15px;font-weight:700;color:#1A2A3A;margin-bottom:14px}
  .def-row{margin-bottom:12px}
  .def-term{font-size:12px;font-weight:700;display:block;margin-bottom:2px}
  .def-def{font-size:12px;color:#4A5A6A;line-height:1.5}
  .drawer-close{margin-top:10px;width:100%;background:none;border:1px solid;
    border-radius:7px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

  /* Scrollbar */
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#C0C4E8;border-radius:3px}
  @keyframes wheelSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

  .wheel-css{width:80px;height:80px;border-radius:50%;display:inline-block;
    background:conic-gradient(#C8102E 0deg 60deg,#FFD700 60deg 120deg,#1E1F56 120deg 180deg,
      #E07820 180deg 240deg,#2A6A3A 240deg 300deg,#8B2090 300deg 360deg);
    animation:wheelSpin 2.4s linear infinite;position:relative;box-shadow:0 3px 14px rgba(0,0,0,.22)}
  .wheel-css::after{content:'';position:absolute;inset:30%;border-radius:50%;background:#fff;
    box-shadow:inset 0 1px 4px rgba(0,0,0,.2)}
  details summary::-webkit-details-marker{display:none}
  details summary::marker{display:none}
</style>
</head>
<body>
<div id="nav">
  <span id="nav-label"></span>
  <button class="nav-btn active" id="nav-fac" onclick="showView('facilitator')">🖥 <span id="nav-fac-lbl"></span></button>
  <button class="nav-btn" id="nav-g1" onclick="showView('mobile','group_1')">📱 <span id="nav-g1-lbl"></span></button>
  <button class="nav-btn" id="nav-g2" onclick="showView('mobile','group_2')">📱 <span id="nav-g2-lbl"></span></button>
  <button class="nav-btn" id="nav-g3" onclick="showView('mobile','group_3')">📱 <span id="nav-g3-lbl"></span></button>
  <button class="nav-btn" id="nav-g4" onclick="showView('mobile','group_4')">📱 <span id="nav-g4-lbl"></span></button>
  <button class="nav-btn" id="nav-content" onclick="showView('devContent')" style="display:none">📋 תוכן</button>
</div>
<div id="app"></div>

// ── Game state ──────────────────────────────────────────
let gameState = {};
GC.groups.forEach(g => {
  // Groups start at order=1 (past the opening transition station)
  gameState[g.id] = {
    groupId: g.id,
    currentStationOrder: 1,
    points: 0,
    waitingOneRound: false,
    playedThisRound: false,
    usedUnexpectedEventIds: [],
    completedStationIds: ['station_start'],
  };
});

function gs(gid){ return gameState[gid]; }
function stationByOrder(order){ return GC.stations.find(s => s.order === order); }
function stationById(id){ return GC.stations.find(s => s.id === id); }
function devStyleVal(v) {
  if (!DEV_MODE || typeof v !== 'string' || !v.includes('יושלם')) return v;
  return `<span style="color:#C8102E;font-weight:700">${v}</span>`;
}

function applyOutcome(groupId, stationId, outcome) {
  const st = stationById(stationId);
  const g = gameState[groupId];
  if (!st) return;
  if (!g.completedStationIds.includes(stationId))
    g.completedStationIds.push(stationId);

  g.playedThisRound = true;

  if (outcome === 'correct') {
    g.points += 10;
    g.currentStationOrder = st.order + 1;
    g.waitingOneRound = false;
  } else if (outcome === 'partial') {
    g.points += 5;
    g.currentStationOrder = st.order + 1; // advance station, no waiting — penalty is points only
    g.waitingOneRound = false;
  } else {
    // wrong: 0 points, advance station, wait one round
    g.points += 0;
    g.currentStationOrder = st.order + 1;
    g.waitingOneRound = true;
  }
  // advanceTurn() called in goBackToMap — after facilitator returns to map
}

// DEV only — skip current group's turn without answering
function devSkipTurn() {
  if (!DEV_MODE) return;
  const g = gameState[GC.groups[currentTurnGroupIndex].id];
  const st = stationByOrder(g.currentStationOrder);
  // mark as played + advance one station (like a "partial" answer)
  if (st) g.currentStationOrder = st.order + 1;
  g.playedThisRound = true;
  g.waitingOneRound = false;
  if (!g.completedStationIds.includes(st && st.id)) g.completedStationIds.push(st && st.id);
  activeStationId = null;
  advanceTurn();
  renderApp();
}

function advanceTurn() {
  // Move to next group — auto-skip any groups that are waiting this round
  let checked = 0;
  do {
    currentTurnGroupIndex = (currentTurnGroupIndex + 1) % GC.groups.length;
    checked++;
    const gst = gameState[GC.groups[currentTurnGroupIndex].id];
    // Serve the wait: clear flag and mark as "played" so we skip them this round
    if (!gst.playedThisRound && gst.waitingOneRound) {
      gst.waitingOneRound = false;
      gst.playedThisRound = true;
      // Note: currentStationOrder is NOT changed here —
      //   partial already advanced it; wrong stays to retry.
    }
  } while (checked < GC.groups.length &&
           gameState[GC.groups[currentTurnGroupIndex].id].playedThisRound);

  // Round complete when every group has played (or was auto-skipped above)
  const allDone = GC.groups.every(g => {
    const gst = gameState[g.id];
    return gst.playedThisRound || gst.waitingOneRound;
  });

  if (allDone) {
    roundNumber++;
    GC.groups.forEach(g => { gameState[g.id].playedThisRound = false; });
    currentTurnGroupIndex = 0;
  }
}

function skipWaitingGroup(groupId) {
  // Manual skip by facilitator (e.g. if a waiting group opens their station)
  // Do NOT advance station — let advanceTurn's auto-skip handle the wait
  const g = gameState[groupId];
  g.waitingOneRound = false;
  g.playedThisRound = true;
  advanceTurn();
  activeStationId = null;
  renderApp();
}

function renderFacilitator(app) {
  const copy = GC.uiCopy;

  let html = '';

  // ── HOOK 1: מצב המשחק החי ────────────────────────────────────────────────
  const groupOrders   = GC.groups.map(g => gs(g.id).currentStationOrder);
  const activeOrder   = gs(currentGroup.id).currentStationOrder;
  const reachedMax    = Math.max(...GC.groups.map(g => gs(g.id).currentStationOrder));
  const statusByGroup = GC.groups.map((g, gi) => {
    const gst = gs(g.id);
    const isCur = gi === currentTurnGroupIndex;
    if (isCur && gst.waitingOneRound) return 'waiting';
    if (isCur) return 'active';
    if (gst.waitingOneRound) return 'waiting';
    if (gst.playedThisRound) return 'played';
    return 'notyet';
  });
  const pointsByGroup = GC.groups.map(g => gs(g.id).points);
  // ──────────────────────────────────────────────────────────────────────────

  // Group palette (תואם לחיילים, טלפונים, ולוח תוצאות)
  const GP = [
    { bg:'#00aeff', fg:'#fff',    tint:'#e8f7ff' },
    { bg:'#1abe9b', fg:'#fff',    tint:'#e6f7f2' },
    { bg:'#f4c40f', fg:'#221f64', tint:'#fdf6df' },
    { bg:'#e84d3d', fg:'#fff',    tint:'#fdece9' },
  ];

  // Station color by type/id
  function bColorOf(s) {
    if (s.type === 'unexpected_event') return '#e84d3d';
    if (s.id === 'station_start')      return '#1abe9b';
    if (s.id === 'station_reflection') return '#e0a200';
    if (s.id === 'station_end')        return '#00aeff';
    if (s.type === 'transition' || s.type === 'reflection') return '#5a6d77';
    return '#221f64';
  }

  // Icon URL
  const BICON = {
    station_start:'flag', station_company_goal:'target', station_outcome_metric:'gauge',
    station_top10:'top10', station_measurable:'doc', station_output_metric:'clipboard',
    station_milestones:'milestone', station_deputy_ceo:'lock',
    station_reward_metric:'wallet', station_weight:'weight',
    station_end:'trophy', station_reflection:'pin',
  };
  const bIconUrl = (s) => 'assets/icons/icon-' +
    (s.type === 'unexpected_event' ? 'wheel' : (BICON[s.id] || 'gauge')) + '.svg';

  // HTML-escape helper
  const bEsc = (t) => String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // ── גריד S: מחושב מ-order + הזרקת שערים ──────────────────────────────────
  const MAPW = 1780, ROWS = 3, COL_MARGIN = 120, ROW_Y = [95, 330, 590];
  const orderedStations = [...GC.stations].sort((a,b) => a.order - b.order);

  // Sequence: stations + injected gates afterOrder
  const seq = [];
  orderedStations.forEach(s => {
    seq.push({ kind:'station', data:s });
    (GC.mapGates||[]).filter(g => g.afterOrder === s.order).forEach(g => seq.push({ kind:'gate', data:g }));
  });

  // Serpentine positions
  const N = seq.length, cols = Math.ceil(N / ROWS);
  const stepX = cols > 1 ? (MAPW - 2*COL_MARGIN) / (cols - 1) : 0;
  seq.forEach((node, i) => {
    const row = Math.floor(i / cols), inRow = i % cols;
    const colFromRight = (row % 2 === 0) ? inRow : (cols - 1 - inRow);
    node.cx = Math.round(MAPW - COL_MARGIN - colFromRight * stepX);
    node.cy = ROW_Y[row] || ROW_Y[ROW_Y.length - 1];
  });
  const pathPoints = seq.map(n => n.cx + ',' + n.cy).join(' ');

  // Token map: order → [groupIndex]
  const tokensByOrder = {};
  groupOrders.forEach((ord, gi) => { (tokensByOrder[ord] = tokensByOrder[ord] || []).push(gi); });

  // Station name by order (for scoreboard)
  const nameByOrder = {};
  orderedStations.forEach(s => nameByOrder[s.order] = (s.type==='unexpected_event' ? 'גלגל הבלת״ם' : s.name));

  // ── Stations HTML ─────────────────────────────────────────────────────────
  const bStationsHtml = seq.filter(n => n.kind==='station').map(n => {
    const s = n.data, col = bColorOf(s);
    const name = s.type === 'unexpected_event' ? GC.uiCopy.stationTypes.unexpectedEventLabel : s.name;
    const isClickable = DEV_MODE || facilitatorPreview || s.order === activeOrder;
    const locked = s.order > reachedMax && !facilitatorPreview && !DEV_MODE;
    const anim = s.order === activeOrder ? 'pulseRing 2s infinite' : 'none';
    const lockOpacity = locked ? 0.62 : 0;
    const labelColor = locked ? '#a7abc0' : col, monthColor = locked ? '#bcc0d0' : '#9aa0b8';
    const toks = (tokensByOrder[s.order]||[]).map(gi =>
      `<div style="width:30px;height:30px;border-radius:50%;background:${GP[gi].bg};border:3px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;color:${GP[gi].fg};font-size:14px;font-weight:800">${gi+1}</div>`
    ).join('');
    return `
      <div style="position:absolute;left:${n.cx}px;top:${n.cy}px;transform:translate(-50%,-62px);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;width:184px;cursor:${isClickable?'pointer':'default'}"
           onclick="${isClickable ? `openStation('${s.id}')` : ''}">
        <div style="position:relative;width:124px;height:124px">
          <div style="position:absolute;inset:0;background:#fff;border-radius:50%;border:5px solid ${col};display:flex;align-items:center;justify-content:center;box-shadow:0 5px 16px rgba(34,31,100,.12);animation:${anim}">
            <img src="${bIconUrl(s)}" alt="" style="width:46px;height:46px">
          </div>
          <div style="position:absolute;inset:-5px;border-radius:50%;background:#fff;opacity:${lockOpacity};z-index:2;pointer-events:none"></div>
          <div style="position:absolute;top:-13px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:4">${toks}</div>
        </div>
        <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:1px">
          <span style="font-size:11px;font-weight:600;color:${monthColor}">${bEsc(s.month||'')}</span>
          <span style="font-size:13.5px;font-weight:700;line-height:1.2;color:${labelColor};max-width:178px">${bEsc(name)}</span>
        </div>
      </div>`;
  }).join('');

  // ── Gates HTML ────────────────────────────────────────────────────────────
  const bGatesHtml = seq.filter(n => n.kind==='gate').map(n => `
      <div style="position:absolute;left:${n.cx}px;top:${n.cy}px;transform:translate(-50%,-62px);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;width:184px">
        <div style="width:124px;height:124px;border-radius:50%;background:#fff;border:4px dashed #8a93a8;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 16px rgba(34,31,100,.10)">
          <img src="assets/icons/icon-gate.svg" alt="" style="width:42px;height:42px;opacity:.8">
        </div>
        <span style="font-size:13.5px;font-weight:700;line-height:1.2;color:#5a6d77;max-width:178px;text-align:center">${bEsc(n.data.name)}</span>
      </div>`).join('');

  // ── HOOK 2: גלולת "תור פעיל" ─────────────────────────────────────────────
  const bTurnText = currentGroup.label + ' · ' + currentGroup.divisionName;

  // ── Scoreboard: כרטיסי לוח תוצאות ────────────────────────────────────────
  const CHIP_DEF = {
    active:  { chip:'תור פעיל',   bg:'#f4c40f', fg:'#221f64' },
    played:  { chip:'✓ שיחקה',    bg:'#dff0e6', fg:'#1a7a44' },
    waiting: { chip:'⏳ ממתינה',  bg:'#fbeccf', fg:'#9a6a00' },
    notyet:  { chip:'מחכה לתורה', bg:'#eef0f5', fg:'#7a809a' },
  };
  const bScoreHtml = GC.groups.map((g, gi) => {
    const status = statusByGroup[gi], isAct = status==='active', c = CHIP_DEF[status]||CHIP_DEF.notyet;
    const cellBg = isAct ? GP[gi].tint : '#fff', cellBorder = isAct ? GP[gi].bg : '#e6e8f0';
    return `
      <div style="flex:1;border-radius:15px;overflow:hidden;background:${cellBg};border:2px solid ${cellBorder};box-shadow:0 4px 14px rgba(34,31,100,.10)">
        <div style="height:6px;background:${GP[gi].bg}"></div>
        <div style="padding:12px 16px 13px;display:flex;flex-direction:column;gap:9px">
          <div style="display:flex;align-items:center;gap:11px">
            <div style="width:38px;height:38px;border-radius:50%;background:${GP[gi].bg};border:3px solid #fff;box-shadow:0 2px 6px rgba(34,31,100,.22);display:flex;align-items:center;justify-content:center;color:${GP[gi].fg};font-size:17px;font-weight:800;flex-shrink:0">${gi+1}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:15px;font-weight:800;color:#1b1c4e">${bEsc(g.label)}</div>
              <div style="font-size:11.5px;font-weight:500;color:#6a70a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${bEsc(g.divisionName)}</div>
            </div>
            <span style="font-size:12px;font-weight:800;border-radius:999px;padding:5px 13px;background:${c.bg};color:${c.fg};white-space:nowrap;flex-shrink:0">${c.chip}</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid #edeef5;padding-top:9px">
            <div style="font-size:11.5px;font-weight:600;color:#5a6075;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0">📍 ${bEsc(nameByOrder[groupOrders[gi]]||'—')}</div>
            <div style="display:flex;align-items:baseline;gap:4px;flex-shrink:0">
              <span style="font-size:24px;font-weight:800;color:#1b1c4e;font-variant-numeric:tabular-nums">${pointsByGroup[gi]}</span>
              <span style="font-size:11px;font-weight:700;color:#9aa0b8">נק׳</span>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  // ── HOOK 3: Phone buttons (זכוכית מגדלת) ─────────────────────────────────
  const bPhonesHtml = !boardPhonesOpen ? '' : `
    <div style="display:flex;flex-direction:column;gap:11px;background:#fff;padding:13px;border-radius:18px;box-shadow:0 8px 26px rgba(34,31,100,.22);border:1px solid #e3e6ef">
      ${DEV_MODE ? `<button onclick="openDevContent()" title="תוכן פיתוח"
        style="width:48px;height:48px;border-radius:11px;border:1.5px solid #d0d4e8;background:#f0f2f8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:#3a3f6c">☰</button>` : ''}
      ${GC.groups.map((g, gi) => `
        <button onclick="openMobile('${g.id}')" title="${bEsc(g.label)} — ${bEsc(g.divisionName)}"
          style="width:48px;height:72px;border-radius:11px;border:2px solid #fff;background:${GP[gi].bg};cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 3px 10px rgba(34,31,100,.22)">
          <span style="width:15px;height:2px;border-radius:2px;background:${GP[gi].fg};opacity:.65"></span>
          <span style="font-size:22px;font-weight:800;color:${GP[gi].fg};line-height:1">${gi+1}</span>
          <span style="width:9px;height:9px;border-radius:50%;border:1.5px solid ${GP[gi].fg};opacity:.65"></span>
        </button>`).join('')}
    </div>`;

  html += `<div id="board-fitwrap" style="flex:1;overflow:hidden;background:#dfe2e8;display:flex;align-items:center;justify-content:center">
    <div id="gameboard" style="width:1920px;height:1080px;flex:none;transform-origin:center center;position:relative;overflow:hidden;background:#eef0f4 url('assets/board-bg.png') center/cover no-repeat">
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:30px 56px 24px;font-family:Heebo,Arial,sans-serif;color:#221f64">

        <!-- כותרת: גלולת תור (ימין) · לוגואים (מרכז) · לוגו רכבת (שמאל) -->
        <div style="display:flex;align-items:center;gap:24px;flex-shrink:0;height:150px">
          <div style="flex:1;display:flex;justify-content:flex-start">
            <div style="background:#221f64;border-radius:40px;padding:8px 20px 8px 14px;display:flex;align-items:center;gap:11px;box-shadow:0 5px 16px rgba(34,31,100,.22)">
              <span style="background:#f4c40f;color:#221f64;font-weight:800;font-size:13px;border-radius:20px;padding:4px 12px">תור פעיל</span>
              <span style="color:#fff;font-size:16px;font-weight:700">${bEsc(bTurnText)}</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
            <img src="assets/logo-mesilot.png" alt="מסילות" style="height:109px;width:266px">
            <img src="assets/logo-vetichnunim.png" alt="ותכנונים" style="height:93px;width:219px">
          </div>
          <div style="flex:1;display:flex;justify-content:flex-end">
            <img src="assets/logo-rail.png" alt="רכבת ישראל" style="height:28px;width:auto;opacity:.9">
          </div>
        </div>

        <!-- מפת המסלול -->
        <div style="flex:1;position:relative;min-height:0">
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:${MAPW}px;height:740px">
            <svg width="${MAPW}" height="740" viewBox="0 0 ${MAPW} 740" style="position:absolute;inset:0;z-index:0" fill="none">
              <polyline points="${pathPoints}" stroke="#cdd2de" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="${pathPoints}" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 12"/>
            </svg>
            ${bGatesHtml}${bStationsHtml}
          </div>
        </div>

        <!-- לוח תוצאות -->
        <div style="flex-shrink:0;display:flex;gap:16px">${bScoreHtml}</div>

      </div>

      <!-- זכוכית מגדלת צפה + טלפונים (HOOK 3) -->
      <div style="position:absolute;bottom:166px;left:28px;z-index:50;display:flex;flex-direction:column-reverse;align-items:center;gap:12px">
        <button onclick="toggleBoardPhones()" title="פתיחת תיקי הקבוצות"
          style="width:56px;height:56px;border-radius:50%;border:2px solid #cfe9f7;background:${boardPhonesOpen?'#cfeefc':'#ffffff'};color:#0a6aa0;font-size:23px;cursor:pointer;box-shadow:0 5px 16px rgba(34,31,100,.22);display:flex;align-items:center;justify-content:center">🔍</button>
        ${bPhonesHtml}
      </div>
    </div>
  </div>`;
  } // end if (!activeStationId)

  // Station modal overlay — shown over map when a station is active
  if (activeStationId) {
    html += renderStationModal();
  }

  // Check round complete
  const allPlayedOrWaiting = GC.groups.every(g => {
    const gst = gs(g.id);
    return gst.playedThisRound || gst.waitingOneRound;
  });

  // Status bar — replaced by the scoreboard inside the gameboard

  // Round complete banner
  if (allPlayedOrWaiting) {
    html += `<div style="background:#F5C800;color:#1E1F56;text-align:center;
      font-size:12px;font-weight:700;padding:6px;letter-spacing:.02em">
      ${copy.statusBar.roundComplete}
    </div>`;
  }

  // Soft warning modal
  if (softWarningGroup) {
    html += `
      <div class="overlay">
        <div class="modal">
          <p>${GC.uiCopy.messages.softWarning}</p>
          <div class="modal-btns">
            <button class="btn-sec" onclick="dismissWarning()">${copy.buttons.cancel}</button>
            <button class="btn-danger" onclick="confirmWarning('${softWarningGroup}')">${copy.buttons.confirmSoftWarning}</button>
          </div>
        </div>
      </div>`;
  }

  // Instructions modal overlay
  if (instructionsOpen) {
    html += `<div onclick="if(event.target===this)closeInstructions()"
      style="position:fixed;inset:0;background:rgba(30,31,86,.55);z-index:800;
        display:flex;align-items:flex-start;justify-content:center;
        padding:32px 16px;overflow-y:auto;direction:rtl">
      <div style="background:#F0F2F7;border-radius:14px;width:100%;max-width:640px;
        padding:28px 24px;box-shadow:0 8px 32px rgba(30,31,86,.25);
        position:relative;margin:auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <span style="font-size:15px;font-weight:700;color:#1E1F56">${GC.uiCopy.welcome.title}</span>
          <button onclick="closeInstructions()"
            style="background:#1E1F56;color:#FFFFFF;border:none;border-radius:7px;
              padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">
            ${GC.uiCopy.welcome.closeInstructionsButton}
          </button>
        </div>
        <p style="font-size:13px;color:#3A3E78;line-height:1.7;margin-bottom:16px;
          padding:12px 14px;background:#EEF0FF;border-radius:8px;border-right:4px solid #1E1F56">
          ${GC.uiCopy.welcome.intro}
        </p>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${GC.uiCopy.welcome.sections.map(s => `
            <div style="background:#FFFFFF;border:1px solid #D0D4F0;border-radius:8px;padding:12px 14px">
              <div style="font-size:12px;font-weight:700;color:#1E1F56;margin-bottom:4px">${s.title}</div>
              <div style="font-size:12px;color:#3A3E78;line-height:1.6">${s.body}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  app.innerHTML = html;
  // Scale the projected gameboard to fill available space
  fitBoard();
}

// ── Projected board auto-fit ─────────────────────────────
function fitBoard() {
  const wrap = document.getElementById('board-fitwrap');
  const board = document.getElementById('gameboard');
  if (!wrap || !board) return;
  const s = Math.min(wrap.clientWidth / 1920, wrap.clientHeight / 1080);
  board.style.transform = 'scale(' + s + ')';
}
window.addEventListener('resize', fitBoard);

// ── Board phone toggle (זכוכית מגדלת) ────────────────────────────────────
function toggleBoardPhones() {
  boardPhonesOpen = !boardPhonesOpen;
  facilitatorPreview = boardPhonesOpen; // פתיחה = נעילות נפתחות; סגירה = נעילות חוזרות
  renderApp(); fitBoard();
}

// HOOK 3: פתיחת תצוגת מובייל של קבוצה מתוך הלוח
function openMobile(groupId) {
  currentView = 'mobile';
  currentGroup = groupId;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const idx = GC.groups.findIndex(g => g.id === groupId);
  if (idx >= 0) {
    const nb = document.getElementById('nav-g' + (idx + 1));
    if (nb) nb.classList.add('active');
  }
  boardPhonesOpen = false;
  location.hash = 'mobile/' + groupId;
  renderApp();
}

function openDevContent() {
  currentView = 'devContent';
  boardPhonesOpen = false;
  facilitatorPreview = false;
  location.hash = 'devContent';
  renderApp();
}

function renderDevContentView() {
  const sorted = [...GC.stations].sort((a, b) => a.order - b.order);
  const typeBadge = {
    professional: {label: 'מקצועית', bg: '#1E1F56', color: '#fff'},
    unexpected_event: {label: 'בלת"מ', bg: '#E07820', color: '#fff'},
    transition: {label: 'מעבר', bg: '#5A5EAA', color: '#fff'},
    reflection: {label: 'רפלקציה', bg: '#8A70C0', color: '#fff'},
  };

  const cards = sorted.map(station => {
    const badge = typeBadge[station.type] || {label: station.type, bg: '#999', color: '#fff'};
    const badgeHtml = `<span style="background:${badge.bg};color:${badge.color};font-size:10px;font-weight:700;
      border-radius:4px;padding:2px 8px;white-space:nowrap">${badge.label}</span>`;

    let bodyHtml = '';

    if (station.type === 'transition' || station.type === 'reflection') {
      const tm = station.transitionMessageId ? GC.transitionMessages[station.transitionMessageId] : null;
      bodyHtml = `<div style="padding:12px 16px;font-size:13px;color:#5A5E88;font-style:italic">
        ${tm ? `<strong style="color:#1E1F56">${tm.title}</strong><br>${tm.body}` : 'תחנת מעבר'}
      </div>`;

    } else if (station.type === 'unexpected_event') {
      const ueSet = GC.unexpectedEvents[station.unexpectedEventSetId] || [];
      const ueItems = ueSet.map(r => {
        const noDelay = r.waitRounds === 0;
        return `<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;
          border-bottom:1px solid #F5E8D0">
          <span style="font-size:14px;font-weight:700;color:#7A3A00;flex-shrink:0;margin-top:1px">⚡</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:#7A3A00;margin-bottom:4px">${r.label}</div>
            <div style="font-size:13px;color:#5A3000;line-height:1.55">${r.description}</div>
          </div>
          <span style="font-size:11px;font-weight:700;white-space:nowrap;padding:4px 10px;border-radius:6px;flex-shrink:0;
            ${noDelay
              ? 'background:#E8F5EE;color:#1A6A3A;border:1px solid #A8D8B8'
              : 'background:#FEE8EC;color:#A0001A;border:1px solid #F0A0B0'}">
            ${noDelay ? '✓ אין עיכוב' : '⏸ המתנה סבב'}
          </span>
        </div>`;
      }).join('');
      bodyHtml = `<div style="background:#FFF3E0;overflow:hidden">
        ${ueItems || '<div style="padding:12px 16px;color:#999;font-size:12px">אין פריטים</div>'}
      </div>`;

    } else if (station.type === 'professional') {
      const q = station.questionId
        ? GC.stationQuestions.find(x => x.id === station.questionId)
        : null;
      if (!q) {
        bodyHtml = `<div style="padding:12px 16px;font-size:12px;color:#999">אין שאלה</div>`;
      } else {
        const groupCards = GC.groups.map(group => {
          const ans = q.answersByGroup[group.id];
          const col = COLOR[group.colorToken];
          if (!ans) return '';
          return `<div style="background:#FAFBFF;border:1px solid ${col.primary}44;border-radius:8px;
            padding:14px;overflow:hidden;border-right:4px solid ${col.primary}">
            <div style="font-weight:700;font-size:13px;color:${col.primary};margin-bottom:10px;
              padding-bottom:8px;border-bottom:1px solid ${col.primary}22">
              ${group.label} — ${group.divisionName}
            </div>
            <div style="font-size:13px;line-height:1.7;display:flex;flex-direction:column;gap:7px">
              <div><span style="color:#6A70B0;font-weight:700">משימה: </span><span style="color:#1A1C50">${ans.taskName}</span></div>
              <div><span style="color:#C8102E;font-weight:700">מה לא תקין: </span><span style="color:#3A1A1A">${ans.whatIsWrong}</span></div>
              <div><span style="color:#1A6A3A;font-weight:700">תיקון נכון: </span><span style="color:#0D3A22">${ans.correctFix}</span></div>
              ${ans.facilitatorNotes ? `<div><span style="color:#8A70C0;font-weight:700">הערת מנחה: </span><span style="color:#3A2060">${ans.facilitatorNotes}</span></div>` : ''}
            </div>
          </div>`;
        }).filter(Boolean).join('');

        bodyHtml = `<div style="padding:12px 16px 4px;background:#fff;border-bottom:1px solid #E8EAF4">
          <div style="font-size:13px;color:#3A3E78;line-height:1.6;margin-bottom:6px;
            padding:10px 12px;background:#EEF0FF;border-right:3px solid #1E1F56;border-radius:6px">
            <strong style="color:#1E1F56">שאלה: </strong>${q.questionText}
          </div>
          <div style="font-size:12px;color:#5A60A0;font-style:italic;margin-bottom:8px">
            ${q.professionalPrinciple}
          </div>
        </div>
        <div style="padding:10px 16px 14px;background:#F8F9FF">
          <div style="display:flex;flex-direction:column;gap:10px">
            ${groupCards}
          </div>
        </div>`;
      }
    }

    return `<details style="background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(30,31,86,.10);overflow:hidden">
      <summary style="background:#1E1F56;color:#fff;padding:13px 16px;cursor:pointer;list-style:none;
        display:flex;align-items:center;gap:10px;flex-wrap:wrap;user-select:none;-webkit-tap-highlight-color:transparent">
        <span style="font-size:11px;color:#A0A8D8;min-width:20px;flex-shrink:0">${station.order}</span>
        <span style="font-weight:700;font-size:15px;flex:1;line-height:1.3">${station.name}</span>
        <span style="font-size:11px;color:#C8CEF0;white-space:nowrap">${station.month || ''}</span>
        ${badgeHtml}
        <span style="font-size:10px;color:#A0A8D8;opacity:.8;flex-shrink:0">▼</span>
      </summary>
      ${bodyHtml}
    </details>`;
  }).join('');

  return `<div id="board-wrap" style="direction:rtl;padding:10px 12px">
    <div style="padding:4px 2px 12px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:14px;font-weight:800;color:#1E1F56">סקירת תוכן — כל התחנות</span>
      <span style="font-size:12px;color:#8A90C0;background:#EEF0FF;padding:3px 10px;border-radius:12px">${GC.stations.length} תחנות</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;max-width:600px;margin:0 auto">
      ${cards}
    </div>
  </div>`;
}

function renderStationNode(s) {
  const groupsHere = GC.groups.filter(g => gs(g.id).currentStationOrder === s.order);
  const segCls = s.segment === 'compensation' ? 'compensation' :
                 s.segment === 'transition_to_compensation' ? 'transition_to_compensation' : '';
  const typeCls = s.type;
  return `
    <div class="s-node ${typeCls} ${segCls}"
      style="left:${s.boardPosition.x}%;top:${s.boardPosition.y}%"
      onclick="openStation('${s.id}')"
      title="${s.name}">
      <div class="s-month">${s.month || ''}</div>
      <div class="s-name">${s.type === 'unexpected_event' ? '⚡ ' + GC.uiCopy.stationTypes.unexpectedEventLabel : s.name}</div>
      ${groupsHere.length ? `<div class="token-row">${groupsHere.map(g =>
        `<span class="token" style="background:${COLOR[g.colorToken].primary}" title="${g.label}"></span>`
      ).join('')}</div>` : ''}
    </div>`;
}

function renderStationModal() {
  const station = stationById(activeStationId);
  if (!station) return '';
  const question = station.questionId
    ? GC.stationQuestions.find(q => q.id === station.questionId)
    : null;
  const copy = GC.uiCopy;
  const currentGroup = GC.groups[currentTurnGroupIndex];
  const gst = gs(currentGroup.id);
  const isWaiting = gst.waitingOneRound;
  const answered = revealedGroups.has(currentGroup.id + '_outcome');
  const ueSet = station.type === 'unexpected_event'
    ? (GC.unexpectedEvents[station.unexpectedEventSetId] || [])
    : null;
  const ueAlreadyUsed = ueSet
    ? ueSet.some(e => gst.usedUnexpectedEventIds.includes(e.resultId))
    : false;
  const canClose = DEV_MODE || facilitatorPreview || answered
    || (station.type === 'unexpected_event' && (activeUEResult !== null || ueAlreadyUsed));

  let content = '';

  if (isWaiting && !DEV_MODE) {
    // Group is waiting — show skip prompt (suppressed in dev mode)
    content = `
      <div style="text-align:center;padding:24px 0">
        <p style="font-size:15px;color:#3A3E78;margin-bottom:20px">
          ${copy.groupCard.waitingMessage}
        </p>
        <button onclick="skipWaitingGroup('${currentGroup.id}')"
          style="background:#1E1F56;color:#fff;border:none;border-radius:8px;
            padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
          ${copy.groupCard.skipButton}
        </button>
      </div>`;
  } else if (question) {
    content = `
      <div style="margin-bottom:16px">
        <p style="font-size:12px;color:#6A70B0;font-style:italic;margin-bottom:8px">
          ${question.professionalPrinciple}
        </p>
        <div style="background:#EEF0FF;border-right:4px solid #1E1F56;border-radius:8px;
          padding:14px 16px;display:flex;gap:16px;align-items:flex-start">
          <p style="flex:1;font-size:15px;color:#1A1C50;line-height:1.7;font-weight:500;margin:0">
            ${question.questionText}
          </p>
          <div class="timer-wrap">
            <div class="timer-display" id="timer-display" style="color:#1E1F56">${question.timerSeconds}</div>
            <button class="timer-btn" id="timer-btn"
              style="background:#1A3A2A;border-color:#2A5A3A;color:#A0E0B0"
              onclick="toggleTimer(${question.timerSeconds})">
              ${copy.buttons.startTimer}
            </button>
          </div>
        </div>
      </div>
      ${DEV_MODE
        ? `<div class="cards-grid">${GC.groups.map(g => renderGroupCardModal(g, question, revealedGroups.has(g.id + '_outcome'), false)).join('')}</div>`
        : facilitatorPreview
          ? `<div class="cards-grid">${GC.groups.map(g => renderGroupCardModal(g, question, answered, true)).join('')}</div>`
          : renderGroupCardModal(currentGroup, question, answered)}`;
  } else if (station.transitionMessageId && GC.transitionMessages[station.transitionMessageId]) {
    const tm = GC.transitionMessages[station.transitionMessageId];
    const trGroupColor = COLOR[currentGroup.colorToken].primary;
    content = `
      <div style="text-align:center;padding:16px 0">
        <div style="display:inline-block;background:${trGroupColor}18;border:1.5px solid ${trGroupColor}55;
          border-radius:8px;padding:6px 20px;margin-bottom:16px;font-size:13px;font-weight:700;color:${trGroupColor}">
          ${currentGroup.label} — ${currentGroup.divisionName}
        </div>
        <div style="font-size:20px;font-weight:800;color:#1E1F56;margin-bottom:10px">${tm.title}</div>
        <p style="font-size:14px;color:#3A3E78;line-height:1.7">${tm.body}</p>
        ${answered ? `` : `<button onclick="revealedGroups.add('${currentGroup.id}_outcome');renderApp()"
          style="margin-top:16px;background:#1E1F56;color:#fff;border:none;border-radius:8px;
            padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
          ${GC.uiCopy.groupCard.approveTransition}
        </button>`}
      </div>`;
  } else if (station.type === 'unexpected_event') {
    const ueGroupColor = COLOR[currentGroup.colorToken].primary;
    const ueGroupBadge = `
      <h2 style="font-size:26px;font-weight:900;color:#1E1F56;margin:0 0 14px;text-align:center">גלגל הבלת"מ</h2>
      <div style="display:inline-block;background:${ueGroupColor}18;border:1.5px solid ${ueGroupColor}55;
            border-radius:8px;padding:6px 20px;margin-bottom:18px;font-size:13px;font-weight:700;color:${ueGroupColor}">
            ${currentGroup.label} — ${currentGroup.divisionName}
          </div>`;
    if (activeUEResult) {
      const noDelay = activeUEResult.waitRounds === 0;
      content = `
        <div style="text-align:center;padding:16px 0">
          ${ueGroupBadge}
          <div style="background:#FFF3E0;border:2px solid #E07820;border-radius:12px;
            padding:22px 20px;margin-bottom:20px;max-width:440px;margin-left:auto;margin-right:auto">
            <div style="font-size:12px;color:#A05010;margin-bottom:8px;font-weight:600;letter-spacing:.04em">
              ⚡ תוצאת הגלגל
            </div>
            <div style="font-size:19px;font-weight:800;color:#7A3A00;margin-bottom:10px">
              ${activeUEResult.label}
            </div>
            <p style="font-size:14px;color:#5A3000;line-height:1.65;margin:0 0 14px">
              ${activeUEResult.description}
            </p>
            ${noDelay
              ? `<div style="display:inline-block;background:#E8F5EE;border:1px solid #A8D8B8;
                   border-radius:6px;padding:6px 16px;font-size:13px;font-weight:700;color:#1A6A3A">
                   ✓ ממשיכים קדימה — אין עיכוב
                 </div>`
              : `<div style="display:inline-block;background:#FEE8EC;border:1px solid #F0A0B0;
                   border-radius:6px;padding:6px 16px;font-size:13px;font-weight:700;color:#A0001A">
                   ⏸ הקבוצה ממתינה סבב אחד
                 </div>`}
          </div>
          <button onclick="doUEOutcome('${currentGroup.id}',${noDelay ? 0 : 1})"
            style="background:#1E1F56;color:#fff;border:none;border-radius:8px;
              padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
            הבנו, ממשיכים ←
          </button>
        </div>`;
    } else if (ueAlreadyUsed) {
      content = `
        <div style="text-align:center;padding:28px 0">
          ${ueGroupBadge}
          <div style="font-size:40px;margin-bottom:12px">⚡</div>
          <p style="font-size:14px;color:#5A5A8A;line-height:1.6;margin-bottom:20px;
            max-width:320px;margin-left:auto;margin-right:auto">
            ${GC.uiCopy.messages.unexpectedAlreadyUsed}
          </p>
          <button onclick="doUEOutcome('${currentGroup.id}',0)"
            style="background:#1E1F56;color:#fff;border:none;border-radius:8px;
              padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
            ממשיכים קדימה ←
          </button>
        </div>`;
    } else {
      const devUEList = DEV_MODE && ueSet && ueSet.length
        ? `<div style="margin-top:28px;text-align:right">
            <div style="font-size:11px;color:#C8102E;font-weight:700;letter-spacing:.06em;margin-bottom:10px;text-align:center">
              ⚙ כל התוצאות האפשריות (DEV MODE)
            </div>
            ${ueSet.map((r, i) => `
              <div style="background:#FFF8F0;border:1px solid #E8C090;border-radius:8px;padding:10px 14px;margin-bottom:8px">
                <div style="font-size:12px;font-weight:800;color:#7A3A00;margin-bottom:3px">${i+1}. ${r.label}</div>
                <div style="font-size:12px;color:#5A3000;line-height:1.5">${r.description}</div>
                <div style="margin-top:6px">
                  ${r.waitRounds === 0
                    ? `<span style="background:#E8F5EE;border:1px solid #A8D8B8;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;color:#1A6A3A">✓ אין עיכוב</span>`
                    : `<span style="background:#FEE8EC;border:1px solid #F0A0B0;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;color:#A0001A">⏸ המתנה סבב</span>`}
                  <button onclick="devSelectUEResult('${currentGroup.id}','${station.unexpectedEventSetId}',${i})"
                    style="background:#E07820;color:#fff;border:none;border-radius:4px;padding:2px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-right:8px">
                    ⚡ בחר
                  </button>

        : '';
      content = `
        <div style="text-align:center;padding:8px 0 12px">
          ${ueGroupBadge}
          <div class="wheel-css" style="display:block;margin:0 auto 20px"></div>
          <button onclick="spinWheel('${currentGroup.id}','${station.unexpectedEventSetId}')"
            style="background:#E07820;color:#fff;border:none;border-radius:10px;
              padding:16px 40px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;
              box-shadow:0 4px 16px rgba(224,120,32,.35)">
            ⚡ ${copy.buttons.spinWheel}
          </button>
          ${devUEList}
        </div>`;

  } else {
    content = `<p style="color:#667;text-align:center">${GC.uiCopy.messages.noStationQuestion}</p>`;
  }

  return `
    <div style="position:fixed;inset:0;background:rgba(30,31,86,.55);z-index:600;
      display:flex;align-items:center;justify-content:center;padding:20px;direction:rtl"
      onclick="if(event.target===this && ${canClose ? 'true' : 'false'})goBackToMap()">
      <div style="background:#F0F2F7;border-radius:14px;width:100%;max-width:700px;
        max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(30,31,86,.3)">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          ${station.type === 'unexpected_event'
            ? `<div style="flex:1"></div>`
            : `<div style="flex:1">
                <div style="font-size:11px;color:#8A90C0">${station.month || ''}</div>
                <h2 style="font-size:20px;font-weight:800;color:#1E1F56;margin:0">${station.name}</h2>

              width:32px;height:32px;font-size:16px;cursor:pointer;color:#6A70A0;

    ${outcomePopupVisible && lastOutcome ? (() => {
      const g   = GC.groups.find(x => x.id === lastOutcome.groupId);
      const col = COLOR[g.colorToken];
      const o   = lastOutcome.outcome;
      const icon  = o === 'correct' ? '✅' : o === 'partial' ? '⚠️' : '❌';
      const title = o === 'correct' ? 'תשובה נכונה!'
                  : o === 'partial' ? 'תשובה חלקית'
                  : 'תשובה שגויה';
      const pts   = o === 'correct' ? '+10' : o === 'partial' ? '+5' : '+0';
      const ptsColor = o === 'correct' ? '#1A7A40' : o === 'partial' ? '#8A6A00' : '#A0001A';
      const next  = o === 'wrong' ? 'מתקדמים לתחנה הבאה — ממתינים סבב אחד ⏳'
                  : 'מתקדמים לתחנה הבאה 🚀';
      return `<div class="outcome-popup-overlay" onclick="if(event.target===this)dismissOutcomePopup()">
        <div class="outcome-popup" style="border-top:6px solid ${col.primary}">
          <div class="outcome-popup-icon">${icon}</div>
          <div class="outcome-popup-title" style="color:${col.primary}">${g.label} — ${g.divisionName}</div>
          <div class="outcome-popup-title">${title}</div>
          <div class="outcome-popup-points" style="color:${ptsColor}">${pts} נקודות</div>
          <div class="outcome-popup-msg">${next}</div>
          <button class="outcome-popup-btn" onclick="dismissOutcomePopup()">הבנו, ממשיכים ←</button>
        </div>
      </div>`;
    })() : ''}`;
}

function renderGroupCardModal(group, question, answered, devMode) {
  const ans = question.answersByGroup[group.id];
  const revealed = devMode || revealedGroups.has(group.id);
  const col = COLOR[group.colorToken];
  const copy = GC.uiCopy;
  const gst = gs(group.id);
  const completed = gst.completedStationIds.includes(activeStationId);

  let inner = '';
  if (!revealed) {
    inner = `<button class="reveal-btn" style="background:${col.primary}"
      onclick="revealGroup('${group.id}')">${copy.buttons.revealAnswer}</button>`;
  } else if (!devMode && answered) {
    inner = `<p style="font-size:12px;color:#5A7A9A;font-style:italic">${GC.uiCopy.groupCard.answerRecorded}</p>`;
  } else if (ans) {
    inner = `
      <div class="ans-row"><span class="ans-lbl">${copy.answerCard.taskLabel}</span><span class="ans-val">${ans.taskName}</span></div>
      <div class="ans-row"><span class="ans-lbl">${copy.answerCard.whatIsWrongLabel}</span><span class="ans-val">${ans.whatIsWrong}</span></div>
      <div class="ans-row"><span class="ans-lbl">${copy.answerCard.correctFixLabel}</span><span class="ans-fix">${ans.correctFix}</span></div>
      ${ans.facilitatorNotes ? `<div class="ans-row"><span class="ans-lbl">${copy.answerCard.facilitatorNoteLabel}</span><span class="ans-val">${ans.facilitatorNotes}</span></div>` : ''}
      ${!devMode ? `<div class="outcome-row">
        <button class="outcome-btn" style="background:#1A7A40" onclick="doOutcome('${group.id}','correct')">
          ${copy.buttons.correct}<br><span style="font-size:10px;opacity:.8">${copy.points.correct}</span>
        </button>
        <button class="outcome-btn" style="background:#7A6A00" onclick="doOutcome('${group.id}','partial')">
          ${copy.buttons.partial}<br><span style="font-size:10px;opacity:.8">${copy.points.partial}</span>
        </button>
        <button class="outcome-btn" style="background:#7A1A1A" onclick="doOutcome('${group.id}','wrong')">
          ${copy.buttons.wrong}<br><span style="font-size:10px;opacity:.8">${copy.points.wrong}</span>
        </button>
      </div>` : ''}`;
  } else {
    inner = `<p style="color:#888">${copy.messages.noGroupAnswer}</p>`;
  }

  return `
    <div class="g-card" style="border-top:4px solid ${col.primary}">
      <div class="g-card-header">
        <span class="g-label">${group.label}</span>
        <span class="g-div">${group.divisionName}</span>
        ${completed ? `<span class="completed-badge">${GC.uiCopy.completedBadge}</span>` : ''}
      </div>
      ${inner}
    </div>`;
}

function renderStationScreen() {
  const station = stationById(activeStationId);
  const copy = GC.uiCopy;
  if (!station) return '';

  const question = station.questionId
    ? GC.stationQuestions.find(q => q.id === station.questionId)
    : null;

  let html = `<div id="station-screen">
    <div class="st-month">${station.month || ''}</div>
    <h2 class="st-name">${station.name}</h2>`;

  if (question) {
    html += `<p class="st-principle">${question.professionalPrinciple}</p>`;
    html += `
      <div class="q-box">
        <p class="q-text">${question.questionText}</p>
        <div class="timer-wrap">
          <div class="timer-display" id="timer-display" style="color:#1E1F56">${timerRemaining}</div>
          <button class="timer-btn" id="timer-btn"
            style="background:${timerRunning ? '#3A1A1A' : '#1A3A2A'};border-color:${timerRunning ? '#6A2A2A' : '#2A5A3A'};color:${timerRunning ? '#F0A0A0' : '#A0E0B0'}"
            onclick="toggleTimer(${question.timerSeconds})">
            ${timerRunning ? GC.uiCopy.timer.stop : timerRemaining < question.timerSeconds && timerRemaining > 0 ? GC.uiCopy.timer.resume : copy.buttons.startTimer}
          </button>
        </div>
      </div>
      ${lastOutcome ? renderOutcomeBanner(lastOutcome) : ''}
      <div class="cards-grid">`;

    GC.groups.forEach(g => {
      const ans = question.answersByGroup[g.id];
      const revealed = revealedGroups.has(g.id);
      const gst = gs(g.id);
      const completed = gst.completedStationIds.includes(activeStationId);
      const col = COLOR[g.colorToken];

      html += `
        <div class="g-card" style="border-top:4px solid ${col.primary}">
          <div class="g-card-header">
            <span class="g-label">${g.label}</span>
            <span class="g-div">${g.divisionName}</span>
            ${completed ? `<span class="completed-badge">${GC.uiCopy.completedBadge}</span>` : ''}
          </div>`;

      if (!revealed) {
        html += `<button class="reveal-btn" style="background:${col.primary}" onclick="revealGroup('${g.id}')">${copy.buttons.revealAnswer}</button>`;
      } else if (completed && !revealedGroups.has(g.id + '_outcome')) {
        html += `<p class="completed-note">${copy.messages.stationCompleted}</p>`;
      } else if (ans) {
        html += `
          <div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.taskLabel}</span><span class="ans-val">${ans.taskName}</span></div>
          <div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.whatIsWrongLabel}</span><span class="ans-val">${ans.whatIsWrong}</span></div>
          <div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.correctFixLabel}</span><span class="ans-fix">${ans.correctFix}</span></div>
          ${ans.facilitatorNotes ? `<div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.facilitatorNoteLabel}</span><span class="ans-val">${ans.facilitatorNotes}</span></div>` : ''}
          <div class="outcome-row">
            <button class="outcome-btn" style="background:#1A7A40" onclick="doOutcome('${g.id}','correct')">${copy.buttons.correct}</button>
            <button class="outcome-btn" style="background:#7A6A00" onclick="doOutcome('${g.id}','partial')">${copy.buttons.partial}</button>
            <button class="outcome-btn" style="background:#7A1A1A" onclick="doOutcome('${g.id}','wrong')">${copy.buttons.wrong}</button>
          </div>`;
      } else {
        html += `<p class="completed-note">${GC.uiCopy.messages.noGroupAnswer}</p>`;
      }

      html += `</div>`;
    });

    html += `</div>`;
  } else if (station.transitionMessageId && GC.transitionMessages[station.transitionMessageId]) {
    const tm = GC.transitionMessages[station.transitionMessageId];
    html += `
      <div class="transition-box">
        <div class="transition-title">${tm.title}</div>
        <p class="transition-body">${tm.body}</p>
      </div>`;
  } else {
    html += `<div class="transition-box"><p style="color:#667">${GC.uiCopy.messages.noStationQuestion}</p></div>`;
  }

  html += `</div>`;
  return html;
}

function openStation(stationId) {
  activeStationId = stationId;
  revealedGroups = new Set();
  softWarningGroup = null;
  lastOutcome = null;
  activeUEResult = null;
  stopTimer();
  const st = stationById(stationId);
  const q = st?.questionId ? GC.stationQuestions.find(q=>q.id===st.questionId) : null;
  timerRemaining = q ? q.timerSeconds : 60;
  renderApp();
}

function goBackToMap() {
  // Advance turn only when facilitator explicitly returns to map.
  // In DEV_MODE there are no turn restrictions — skip advanceTurn entirely.
  if (!DEV_MODE) advanceTurn();
  activeStationId = null;
  lastOutcome = null;
  outcomePopupVisible = false;
  revealedGroups = new Set();
  stopTimer();
  renderApp();
}

function revealGroup(groupId) {
  const gst = gs(groupId);
  const st = stationById(activeStationId);
  const atStation = gst.currentStationOrder >= st.order;
  const completed = gst.completedStationIds.includes(activeStationId);
  if (!atStation && !completed) {
    softWarningGroup = groupId;
    renderApp();
    return;
  }
  revealedGroups.add(groupId);
  renderApp();
}

function dismissWarning() { softWarningGroup = null; renderApp(); }
function confirmWarning(gid) { softWarningGroup = null; revealedGroups.add(gid); renderApp(); }

function dismissOutcomePopup() {
  outcomePopupVisible = false;
  goBackToMap(); // return to map after acknowledging result
}

function closeStationModal() {
  // X button — close without advancing turn.
  // But if an outcome was already applied, we must still advance (state already changed).
  if (lastOutcome) {
    goBackToMap();
  } else {
    activeStationId = null;
    outcomePopupVisible = false;
    renderApp();
  }
}

function doOutcome(groupId, outcome) {
  applyOutcome(groupId, activeStationId, outcome);
  revealedGroups.add(groupId + '_outcome');
  lastOutcome = { groupId, outcome, stayed: false };
  outcomePopupVisible = true;
  // Keep modal open only to show result — do NOT advance to next group automatically.
  // Facilitator sees the result, then clicks "חזרה למסלול" manually.
  // advanceTurn() already called inside applyOutcome — currentTurnGroupIndex updated,
  // but activeStationId stays set so modal remains visible with result.
  renderApp();
}

// Timer
function renderOutcomeBanner({ groupId, outcome }) {
  const group = GC.groups.find(g => g.id === groupId);
  const col = COLOR[group.colorToken];
  const msgKey = outcome === 'correct' ? 'correctOutcome'
               : outcome === 'partial' ? 'partialOutcome'
               : 'wrongOutcome';
  const rawMsg = GC.uiCopy.messages[msgKey];
  const msg = (outcome === 'wrong' && lastOutcome && lastOutcome.stayed)
    ? GC.uiCopy.messages.wrongOutcomeStayed
    : rawMsg;
  const template = GC.uiCopy.outcomeBanner[outcome];
  const text = template.replace('{group}', group.label).replace('{msg}', msg);
  const bg = outcome === 'correct' ? '#E8F5EE' : outcome === 'partial' ? '#FFF8DC' : '#FEE8EC';
  const border = outcome === 'correct' ? '#1A8A40' : outcome === 'partial' ? '#C09000' : '#C8102E';
  const textColor = outcome === 'correct' ? '#0D5A28' : outcome === 'partial' ? '#7A5800' : '#A0001A';
  return `<div style="
    background:${bg};
    border:1px solid ${border};
    border-right:4px solid ${col.primary};
    border-radius:8px;
    padding:12px 16px;
    margin-bottom:14px;
    font-size:14px;
    font-weight:600;
    color:${textColor};
    line-height:1.5;
  ">${text}</div>`;
}

function toggleTimer(totalSecs) {
  if (timerRunning) {
    stopTimer();
  } else {
    if (timerRemaining === 0) timerRemaining = totalSecs;
    timerRunning = true;
    timerInterval = setInterval(() => {
      timerRemaining--;
      if (timerRemaining <= 0) { timerRemaining = 0; stopTimer(); }
      const d = document.getElementById('timer-display');
      const b = document.getElementById('timer-btn');
      if (d) {
        d.textContent = timerRemaining;
        d.style.color = timerRemaining > 30 ? '#1E6A3A' : timerRemaining > 15 ? '#B07800' : '#C8102E';
      }
      if (b && timerRemaining === 0) {
        b.textContent = GC.uiCopy.buttons.startTimer;
        b.style.background = '#1A3A2A';
      }
    }, 1000);
    renderApp();
  }
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerRunning = false;
}

let mobileSplashDone = {};

function renderMobile(app, groupId) {
  const group = GC.groups.find(g => g.id === groupId) || GC.groups[0];
  const col = COLOR[group.colorToken];

  app.innerHTML = `<div id="mobile-wrap" dir="rtl"></div>`;
  const wrap = document.getElementById('mobile-wrap');

  // כפתור חזרה ללוח — גלוי רק למנחה (facilitatorPreview)
  if (facilitatorPreview || DEV_MODE) {
    const backBar = document.createElement('div');
    backBar.style.cssText = 'position:fixed;top:0;right:0;left:0;z-index:9999;background:rgba(30,31,86,.92);padding:6px 12px;display:flex;gap:8px;align-items:center';
    backBar.innerHTML = `<button onclick="currentView='facilitator';renderApp()"
      style="background:#F5C800;color:#000;border:none;border-radius:6px;
        padding:5px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
      ← חזרה ללוח
    </button>
    <span style="color:#A0A8D8;font-size:12px">${group.label} · ${group.divisionName}</span>`;
    document.getElementById('app').prepend(backBar);

  // Lock folder if another group is currently playing
  const currentGroup = GC.groups[currentTurnGroupIndex];
  const isLocked = !DEV_MODE && !facilitatorPreview && gameStarted && group.id !== currentGroup.id;

  if (isLocked) {
    renderFolderLocked(wrap, group, col, currentGroup);

    renderSplash(wrap, group, col);
  } else {
    renderFolder(wrap, group, col);
  }
}

                <div style="color:#6B4D00;margin-bottom:2px"><strong>שאלה:</strong> ${q.questionText}</div>
                ${ans ? `<div style="color:#7A3000;margin-bottom:2px"><strong>מה שגוי:</strong> ${ans.whatIsWrong}</div>
                <div style="color:#2D5A00"><strong>תיקון:</strong> ${ans.correctFix}</div>` : ''}
              </div>`;
            }).join('');
            return `<div style="margin-top:8px;padding:8px 10px;background:#FFF3CD;border-radius:6px;border-right:3px solid #E0A020;font-size:11px;color:#7A5000;line-height:1.6;direction:rtl">
              <strong>⚠️ טעות מוטמנת</strong>
              ${stationsHtml}
            </div>`;
          })() : ''}
        </div>` : ''}
    </div>`;
}

function renderCompCard(comp, col, gid) {
  if (!comp) return '<p style="color:#888;padding:12px">' + GC.uiCopy.messages.mobileNoCompensation + '</p>';
  const errs = (DEV_MODE && comp.devErrors) ? new Set(comp.devErrors) : new Set();
  const dv = (v, field) => {
    if (errs.has(field)) return `<span style="background:#FFF3CD;color:#7A5000;font-weight:700;padding:0 4px;border-radius:3px;border-bottom:2px solid #E07000">⚠️ ${v}</span>`;
    return devStyleVal(v);
  };
  const devBox = DEV_MODE && comp.devHint ? (() => {
    const FIELD_TO_QID = {
      rewardMetric: 'q_reward_metric', formula: 'q_reward_metric',
      weight: 'q_weight', performanceThresholds: 'q_weight'
    };
    const QID_LABELS = {
      q_reward_metric: 'מדד תגמול ונוסחה',
      q_weight: 'משקולות וספי ביצוע'
    };
    const uniqueQids = [...new Set((comp.devErrors || []).map(f => FIELD_TO_QID[f]).filter(Boolean))];
    const stationsHtml = uniqueQids.map(qid => {
      const q = GC.stationQuestions.find(sq => sq.id === qid);
      if (!q) return '';
      const ans = q.answersByGroup ? q.answersByGroup[gid] : null;
      return `<div style="margin-top:6px;padding:6px 8px;background:#FFF8E1;border-radius:4px;border-right:2px solid #C8920A">
        <div style="font-weight:700;color:#5D4000;margin-bottom:3px">📍 תחנה: ${QID_LABELS[qid] || qid}</div>
        <div style="color:#6B4D00;margin-bottom:2px"><strong>שאלה:</strong> ${q.questionText}</div>
        ${ans ? `<div style="color:#7A3000;margin-bottom:2px"><strong>מה שגוי:</strong> ${ans.whatIsWrong}</div>
        <div style="color:#2D5A00"><strong>תיקון:</strong> ${ans.correctFix}</div>` : ''}
      </div>`;
    }).join('');
    return `<div style="margin-top:8px;padding:8px 10px;background:#FFF3CD;border-radius:6px;border-right:3px solid #E0A020;font-size:11px;color:#7A5000;line-height:1.6;direction:rtl">
      <strong>⚠️ טעות מוטמנת</strong>
      ${stationsHtml}
    </div>`;
  })() : '';
  return `<div class="comp-card">
    <div class="comp-title" style="color:${col.primary}">${comp.modelName}</div>
    <div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.rewardMetric}</span><span class="f-val">${dv(comp.rewardMetric,'rewardMetric')}</span></div>
    <div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.formula}</span><span class="f-val">${dv(comp.formula,'formula')}</span></div>
    <div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.weight}</span><span class="f-val">${dv(comp.weight,'weight')}</span></div>
    <div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.performanceThresholds}</span><span class="f-val">${dv(comp.performanceThresholds,'performanceThresholds')}</span></div>
    ${comp.dataSource ? `<div class="f-row"><span class="f-lbl">${GC.uiCopy.compensationFields.dataSource}</span><span class="f-val">${dv(comp.dataSource,'dataSource')}</span></div>` : ''}
    ${devBox}
  </div>`;
}

function renderReminderDrawer(defs, col, gid) {
  const copy = GC.uiCopy;
  return `
    <div class="drawer-overlay" onclick="toggleReminder('${gid}')"></div>
    <div class="drawer">
      <div class="drawer-handle" style="background:${col.primary}"></div>
      <div class="drawer-title">${GC.uiCopy.reminderDrawer.title}</div>
      ${defs.map(d => `
        <div class="def-row">
          <span class="def-term" style="color:${col.primary}">${d.term}</span>
          <span class="def-def">${d.definition}</span>
        </div>`).join('')}
      <button class="drawer-close" style="color:${col.primary};border-color:${col.primary}"
        onclick="toggleReminder('${gid}')">${copy.buttons.cancel}</button>
    </div>`;
}

function spinWheel(groupId, ueSetId) {
  const ueSet = GC.unexpectedEvents[ueSetId] || [];
  const idx = Math.floor(Math.random() * ueSet.length);
  activeUEResult = ueSet[idx];
  gs(groupId).usedUnexpectedEventIds.push(activeUEResult.resultId);
  renderApp();
}

function devSelectUEResult(groupId, ueSetId, idx) {
  if (!DEV_MODE) return;
  const ueSet = GC.unexpectedEvents[ueSetId] || [];
  activeUEResult = ueSet[idx];
  // Don't mark as used in dev mode — facilitator is just previewing
  renderApp();
}

function doUEOutcome(groupId, waitRounds) {
  const g = gs(groupId);
  const st = stationById(activeStationId);
  if (!g.completedStationIds.includes(activeStationId))
    g.completedStationIds.push(activeStationId);
  g.playedThisRound = true;
  g.currentStationOrder = st.order + 1; // always advance — wait happens at the NEXT station
  if (waitRounds > 0) {
    g.waitingOneRound = true;
  }
  activeUEResult = null;
  goBackToMap();
}

function switchTab(gid, tab) { activeTab[gid] = tab; renderApp(); }
function toggleTask(gid, taskId) {
  if (!openTasks[gid]) openTasks[gid] = {};
  openTasks[gid][taskId] = !openTasks[gid][taskId];
  renderApp();
}
function toggleReminder(gid) { reminderOpen[gid] = !reminderOpen[gid]; renderApp(); }

// ── Init ────────────────────────────────────────────────
// DEV_MODE active — free navigation enabled via ?devmode=true

// Populate nav labels from GC
document.getElementById('nav-label').textContent = GC.uiCopy.nav.screenLabel;
document.getElementById('page-title').textContent = GC.uiCopy.pageTitle;
document.getElementById('nav-fac-lbl').textContent = GC.uiCopy.nav.facilitator;
GC.groups.forEach((g, i) => {
  const el = document.getElementById('nav-g' + (i+1) + '-lbl');
  if (el) el.textContent = GC.uiCopy.nav.mobile_group
    .replace('{n}', i+1)
    .replace('{division}', g.divisionName);
});
document.getElementById('nav').style.display = 'none';

// ── Hash routing: read URL on load ───────────────────────
(function applyHash() {
  const hash = location.hash.replace('#', '');
  if (!hash) return;
  const [view, group] = hash.split('/');
  if (view === 'mobile' && group) {
    currentView = 'mobile';
    currentGroup = group;
    gameStarted = true;
  } else if (view === 'devContent') {
    currentView = 'devContent';
    gameStarted = true;
  } else if (view === 'facilitator') {
    currentView = 'facilitator';
  }
})();

renderApp();
</script>
</body>
</html>
