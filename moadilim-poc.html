<script>
// ── Firebase sync ────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyA3g2FxtbkxQ5e7kirc68ZdHQnCTC04Eo4",
  authDomain: "mesilotvetichnoonim.firebaseapp.com",
  databaseURL: "https://mesilotvetichnoonim-default-rtdb.firebaseio.com",
  projectId: "mesilotvetichnoonim",
  storageBucket: "mesilotvetichnoonim.firebasestorage.app",
  messagingSenderId: "1021516240299",
  appId: "1:1021516240299:web:00c84883aaa1ba2d846eee"
});
const fbDb = firebase.database();

function pushGameState() {
  const groupData = {};
  GC.groups.forEach(g => {
    groupData[g.id] = {
      points: gameState[g.id].points,
      finishedRound: gameState[g.id].finishedRound
    };
  });
  fbDb.ref('gameState').set({
    gameStarted: phonesActive,
    currentTurnGroupIndex: currentTurnGroupIndex,
    gameOver: gameOver,
    winnerId: winnerId,
    groupData: groupData
  });
}

function endGame() {
  const ranked = [...GC.groups].sort((a, b) => {
    const ga = gameState[a.id], gb = gameState[b.id];
    if (ga.finishedRound !== gb.finishedRound) return ga.finishedRound - gb.finishedRound;
    return gb.points - ga.points;
  });
  gameOver = true;
  winnerId = ranked[0].id;
  pushGameState();
  renderApp();
}

// קבוצה אחרונה שמגיעה ל"מודל תגמול מאושר" → חשיפת הדירוג והמנצחת
function revealFinalRanking() {
  const finishingGroup = GC.groups[currentTurnGroupIndex];
  const g = gameState[finishingGroup.id];
  if (g && g.finishedRound === null) {
    g.finishedRound = roundNumber;
    g.playedThisRound = true;
    g.currentStationOrder = stationById('station_end').order + 1;
  }
  activeStationId = null;
  revealedGroups = new Set();
  stopTimer();
  gameOverDismissed = false;
  commitmentOpen = false;
  endGame();
}

  tick()         {
    if (!_tickEl) return;
    _tickEl.pause(); _tickEl.currentTime = 0;
    _tickEl.play().catch(()=>{});
  },
  stopTick()     {

// ── Game state ──────────────────────────────────────────
let gameState = {};
GC.groups.forEach(g => {
  gameState[g.id] = {
    groupId: g.id,
    currentStationOrder: 0,
    points: 0,
    waitingOneRound: false,
    waitingReason: null,
    playedThisRound: false,
    finishedRound: null,
    usedUnexpectedEventIds: [],
    completedStationIds: [],
  };
});

function gs(gid){ return gameState[gid]; }
function stationByOrder(order){ return GC.stations.find(s => s.order === order); }
function stationById(id){ return GC.stations.find(s => s.id === id); }
function devStyleVal(v) {
  if (!DEV_MODE || typeof v !== 'string' || !v.includes('יושלם')) return v;
  return `<span style="color:#C8102E;font-weight:700">${v}</span>`;
}

function applyOutcome(groupId, stationId, outcome) {
  const st = stationById(stationId);
  const g = gameState[groupId];
  if (!st) return;
  if (!g.completedStationIds.includes(stationId))
    g.completedStationIds.push(stationId);

  g.playedThisRound = true;

  if (outcome === 'correct') {
    g.points += 10;
    g.currentStationOrder = st.order + 1;
    g.waitingOneRound = false;
  } else if (outcome === 'partial') {
    g.points += 5;
    g.currentStationOrder = st.order + 1; // advance station, no waiting — penalty is points only
    g.waitingOneRound = false;
  } else {
    // wrong: 0 points, advance station, wait one round
    g.points += 0;
    g.currentStationOrder = st.order + 1;
    g.waitingOneRound = true;
    g.waitingReason = 'wrong';
  }
  // advanceTurn() called in goBackToMap — after facilitator returns to map
}

// DEV only — skip current group's turn without answering
function devSkipTurn() {
  if (!DEV_MODE) return;
  const g = gameState[GC.groups[currentTurnGroupIndex].id];
  const st = stationByOrder(g.currentStationOrder);
  // mark as played + advance one station (like a "partial" answer)
  if (st) g.currentStationOrder = st.order + 1;
  g.playedThisRound = true;
  g.waitingOneRound = false;
  if (!g.completedStationIds.includes(st && st.id)) g.completedStationIds.push(st && st.id);
  activeStationId = null;
  advanceTurn();
  renderApp();
}

function advanceTurn() {
  // Move to next group — auto-skip any groups that are waiting this round
  let checked = 0;
  do {
    currentTurnGroupIndex = (currentTurnGroupIndex + 1) % GC.groups.length;
    checked++;
    const gst = gameState[GC.groups[currentTurnGroupIndex].id];
    // Serve the wait: clear flag and mark as "played" so we skip them this round
    if (!gst.playedThisRound && gst.waitingOneRound) {
      gst.waitingOneRound = false;
      gst.playedThisRound = true;
      // Note: currentStationOrder is NOT changed here —
      //   partial already advanced it; wrong stays to retry.
    }
  } while (checked < GC.groups.length &&
           gameState[GC.groups[currentTurnGroupIndex].id].playedThisRound);

  // Round complete when every group has played (or was auto-skipped above)
  const allDone = GC.groups.every(g => {
    const gst = gameState[g.id];
    return gst.playedThisRound || gst.waitingOneRound;
  });

  if (allDone) {
    roundNumber++;
    GC.groups.forEach(g => { gameState[g.id].playedThisRound = false; });
    currentTurnGroupIndex = 0;
  }
  pushGameState();
}

function skipWaitingGroup(groupId) {
  // Manual skip by facilitator (e.g. if a waiting group opens their station)
  // Do NOT advance station — let advanceTurn's auto-skip handle the wait
  const g = gameState[groupId];
  g.waitingOneRound = false;
  g.waitingReason = null;
  g.playedThisRound = true;
  advanceTurn();
  activeStationId = null;
  renderApp();
}

function enterBoard() {
  gameStarted = true;
  phonesActive = true;
  GC.groups.forEach(g => {
    const gst = gs(g.id);
    if (gst.currentStationOrder === 0) {
      gst.currentStationOrder = 1;
      if (!gst.completedStationIds.includes('station_start'))
        gst.completedStationIds.push('station_start');
    }
  });
  pushGameState();
  instructionsOpen = false;
  renderApp();
}

function activatePhones() {
  phonesActive = true;

function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:9999;pointer-events:none';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#00aeff','#1abe9b','#f4c40f','#7b5fd4','#e84d3d','#221f64'];
  const pieces = Array.from({length: 150}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    w: 8 + Math.random() * 10,
    h: 4 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * Math.PI * 2,
    vx: (Math.random() - 0.5) * 2.5,
    vy: 2.5 + Math.random() * 3.5,
    vr: (Math.random() - 0.5) * 0.18,
  }));
  const start = performance.now();
  function draw(now) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const elapsed = now - start;
    const fade = elapsed > 3000 ? Math.max(0, 1 - (elapsed - 3000) / 1000) : 1;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      ctx.save();
      ctx.globalAlpha = 0.85 * fade;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    if (elapsed < 4000) requestAnimationFrame(draw);
    else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function renderApp() {
  const app = document.getElementById('app');
  if (currentView === 'facilitator' && !gameStarted && !DEV_MODE) {
    if (!welcomeIntroShown) { renderWelcomeIntro(app); return; }
    renderWelcome(app);
    return;
  }
  if (currentView === 'facilitator' && !gameStarted && DEV_MODE) {
    gameStarted = true; // skip welcome in dev mode
  }
  if (currentView === 'facilitator') {
    renderFacilitator(app);
  } else if (currentView === 'dev') {
    renderDevView(app);
  } else if (currentView === 'devContent') {
    app.innerHTML = renderDevContentView();
  } else if (currentView === 'answerKey') {
    app.innerHTML = renderAnswerKeyView();
  } else {
    renderMobile(app, currentGroup);
  }

}

function renderFacilitator(app) {
  const copy = GC.uiCopy;
  const currentGroup = GC.groups[currentTurnGroupIndex];

  let html = '';

  if (!activeStationId) {
  // ── HOOK 1: מצב המשחק החי ────────────────────────────────────────────────
  const groupOrders   = GC.groups.map(g => gs(g.id).currentStationOrder);
  const activeOrder   = gs(currentGroup.id).currentStationOrder;
  const reachedMax    = Math.max(...GC.groups.map(g => gs(g.id).currentStationOrder));
  const statusByGroup = GC.groups.map((g, gi) => {
    const gst = gs(g.id);
    const isCur = gi === currentTurnGroupIndex;
    if (isCur && gst.waitingOneRound) return 'waiting';
    if (isCur) return 'active';
    if (gst.waitingOneRound) return 'waiting';
    if (gst.playedThisRound) return 'played';
    return 'notyet';
  });
  const pointsByGroup = GC.groups.map(g => gs(g.id).points);
  // ──────────────────────────────────────────────────────────────────────────

  // Group palette (תואם לחיילים, טלפונים, ולוח תוצאות)
  const GP = [
    { bg:'#00aeff', fg:'#fff',    tint:'#e8f7ff' },
    { bg:'#1abe9b', fg:'#fff',    tint:'#e6f7f2' },
    { bg:'#e8821e', fg:'#fff', tint:'#fdf0e8' },
    { bg:'#7b5fd4', fg:'#fff',    tint:'#f1ecfb' },
  ];

  // Station color by type/id
  function bColorOf(s) {
    if (s.type === 'unexpected_event') return '#e84d3d';
    if (s.id === 'station_start')      return '#1abe9b';
    if (s.id === 'station_reflection') return '#e0a200';
    if (s.id === 'station_end')        return '#00aeff';
    if (s.type === 'transition' || s.type === 'reflection') return '#5a6d77';
    return '#221f64';
  }

  // Icon URL
  const BICON = {
    station_start:'flag', station_company_goal:'target', station_outcome_metric:'gauge',
    station_top10:'top10', station_measurable:'doc', station_output_metric:'clipboard',
    station_milestones:'milestone', station_deputy_ceo:'lock',
    station_reward_metric:'wallet', station_weight:'weight',
    station_end:'trophy', station_reflection:'pin',
  };
  const bIconUrl = (s) => 'assets/icons/icon-' +
    (s.type === 'unexpected_event' ? 'wheel' : (BICON[s.id] || 'gauge')) + '.svg';

  // HTML-escape helper
  const bEsc = (t) => String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // ── גריד S: מחושב מ-order + הזרקת שערים ──────────────────────────────────
  const MAPW = 1780, ROWS = 3, COL_MARGIN = 120, ROW_Y = [95, 330, 590];
  const orderedStations = [...GC.stations].sort((a,b) => a.order - b.order);

  // Sequence: stations + injected gates afterOrder
  const seq = [];
  orderedStations.forEach(s => {
    seq.push({ kind:'station', data:s });
    (GC.mapGates||[]).filter(g => g.afterOrder === s.order).forEach(g => seq.push({ kind:'gate', data:g }));
  });

  // Serpentine positions
  const N = seq.length, cols = Math.ceil(N / ROWS);
  const stepX = cols > 1 ? (MAPW - 2*COL_MARGIN) / (cols - 1) : 0;
  seq.forEach((node, i) => {
    const row = Math.floor(i / cols), inRow = i % cols;
    const colFromRight = (row % 2 === 0) ? inRow : (cols - 1 - inRow);
    node.cx = Math.round(MAPW - COL_MARGIN - colFromRight * stepX);
    node.cy = ROW_Y[row] || ROW_Y[ROW_Y.length - 1];
  });
  const pathPoints = seq.map(n => n.cx + ',' + n.cy).join(' ');

  // Token map: order → [groupIndex]
  const tokensByOrder = {};
  groupOrders.forEach((ord, gi) => { (tokensByOrder[ord] = tokensByOrder[ord] || []).push(gi); });

  // Station name by order (for scoreboard)
  const nameByOrder = {};
  orderedStations.forEach(s => nameByOrder[s.order] = (s.type==='unexpected_event' ? 'גלגל הבלת״ם' : s.name));

  // ── Stations HTML ─────────────────────────────────────────────────────────
  const bStationsHtml = seq.filter(n => n.kind==='station').map(n => {
    const s = n.data, col = bColorOf(s);
    const name = s.type === 'unexpected_event' ? GC.uiCopy.stationTypes.unexpectedEventLabel : s.name;
    const isClickable = DEV_MODE || facilitatorPreview || s.order === activeOrder || s.id === 'station_start';
    const locked = s.order > reachedMax && !facilitatorPreview && !DEV_MODE;
    const anim = s.order === activeOrder ? 'pulseRing 2s infinite' : 'none';
    const lockOpacity = locked ? 0.62 : 0;
    const labelColor = locked ? '#a7abc0' : col, monthColor = locked ? '#bcc0d0' : '#9aa0b8';
    const toks = (tokensByOrder[s.order]||[]).map(gi => {
      const isCur = gi === currentTurnGroupIndex;
      const sz = isCur ? '56px' : '30px';
      const fs = isCur ? '24px' : '14px';
      const tf = isCur ? 'translateY(-10px)' : 'none';
      const sh = isCur ? '0 6px 16px rgba(0,0,0,.4)' : '0 2px 5px rgba(0,0,0,.25)';
      const bw = isCur ? '4px' : '3px';
      return `<div style="width:${sz};height:${sz};border-radius:50%;background:${GP[gi].bg};border:${bw} solid #fff;box-shadow:${sh};display:flex;align-items:center;justify-content:center;color:${GP[gi].fg};font-size:${fs};font-weight:800;transform:${tf};transition:all .2s;flex-shrink:0">${gi+1}</div>`;
    }).join('');
    return `
      <div style="position:absolute;left:${n.cx}px;top:${n.cy}px;transform:translate(-50%,-62px);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;width:184px;cursor:${isClickable?'pointer':'default'}"
           onclick="${isClickable ? `openStation('${s.id}')` : ''}">
        <div style="position:relative;width:124px;height:124px">
          <div style="position:absolute;inset:0;background:#fff;border-radius:50%;border:5px solid ${col};display:flex;align-items:center;justify-content:center;box-shadow:0 5px 16px rgba(34,31,100,.12);animation:${anim}">
            <img src="${bIconUrl(s)}" alt="" style="width:46px;height:46px">
          </div>
          <div style="position:absolute;inset:-5px;border-radius:50%;background:#fff;opacity:${lockOpacity};z-index:2;pointer-events:none"></div>
          <div style="position:absolute;top:-13px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:4">${toks}</div>
        </div>
        <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;background:${(s.id==='station_measurable'||s.id==='station_reward_metric')?'rgba(255,255,255,.82)':'transparent'};border-radius:9px;padding:4px 11px">
          <span style="font-size:15px;font-weight:700;color:${monthColor}">${bEsc(s.month||'')}</span>
          <span style="font-size:21px;font-weight:800;line-height:1.18;color:${labelColor};max-width:210px">${bEsc(name)}</span>
        </div>
      </div>`;
  }).join('');

  // ── Gates HTML ────────────────────────────────────────────────────────────
  const bGatesHtml = seq.filter(n => n.kind==='gate').map(n => `
      <div style="position:absolute;left:${n.cx}px;top:${n.cy}px;transform:translate(-50%,-62px);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;width:184px">
        <div style="width:124px;height:124px;border-radius:50%;background:#fff;border:4px dashed #8a93a8;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 16px rgba(34,31,100,.10)">
          <img src="assets/icons/icon-gate.svg" alt="" style="width:42px;height:42px;opacity:.8">
        </div>
        <span style="font-size:20px;font-weight:700;line-height:1.18;color:#5a6d77;max-width:200px;text-align:center">${bEsc(n.data.name)}</span>
      </div>`).join('');

  // ── HOOK 2: גלולת "תור פעיל" ─────────────────────────────────────────────
  const bTurnText = currentGroup.label + ' · ' + currentGroup.divisionName;
  const bCurIdx = GC.groups.indexOf(currentGroup);
  const bGP = GP[bCurIdx] || GP[0];

  // ── Scoreboard: צ'יפי קבוצות תחתיים ────────────────────────────────────────
  const bRoundHtml = `<div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:rgba(255,255,255,.22);border-radius:20px;padding:10px 22px;min-width:90px">
    <span style="font-size:13px;font-weight:600;color:rgba(27,28,78,.55);letter-spacing:.04em">סבב</span>
    <span style="font-size:34px;font-weight:900;color:#1b1c4e;line-height:1;font-variant-numeric:tabular-nums">${roundNumber}</span>
  </div>`;
  const bScoreHtml = GC.groups.map((g, gi) => {
    const isAct = gi === currentTurnGroupIndex;
    const pts = pointsByGroup[gi];
    const isPlayerLocked = gameStarted && gi !== currentTurnGroupIndex;
    const phoneIcon = `<svg viewBox="0 0 24 24" width="${isAct?'18':'16'}" height="${isAct?'18':'16'}" fill="none"><rect x="5" y="2" width="14" height="20" rx="2" stroke="${GP[gi].fg}" stroke-width="1.8"/><line x1="9" y1="5" x2="15" y2="5" stroke="${GP[gi].fg}" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="17" r="1.5" fill="${GP[gi].fg}"/></svg>`;
    const lockDot = isPlayerLocked ? `<span style="position:absolute;bottom:-3px;left:-3px;width:15px;height:15px;border-radius:50%;background:#e84d3d;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 10 10" width="9" height="9" fill="none"><rect x="1.5" y="4.5" width="7" height="5" rx="1" stroke="#fff" stroke-width="1.1"/><path d="M3 4.5V3.5a2 2 0 014 0v1" stroke="#fff" stroke-width="1.1" fill="none"/></svg></span>` : '';
    const phoneBtn = `<button onclick="event.stopPropagation();openMobile('${g.id}',false)" style="flex-shrink:0;width:${isAct?'36px':'30px'};height:${isAct?'36px':'30px'};border-radius:9px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;padding:0" title="פתח תיקיית ${bEsc(g.label)}">${phoneIcon}${lockDot}</button>`;
    return `
      <div style="flex:${isAct ? '1.25' : '1'};border-radius:999px;background:${GP[gi].bg};padding:${isAct ? '12px 24px' : '11px 22px'};
        display:flex;align-items:center;gap:14px;transform:${isAct ? 'scale(1.02) translateY(-8px)' : 'none'};transform-origin:center;z-index:${isAct ? 2 : 1};
        box-shadow:${isAct ? '0 12px 28px rgba(34,31,100,.34)' : 'none'};
        opacity:${isAct ? 1 : 0.5};
        border:${isAct ? '3px solid rgba(255,255,255,.6)' : '2px solid transparent'}">
        <div style="width:${isAct ? '40px' : '34px'};height:${isAct ? '40px' : '34px'};border-radius:50%;background:rgba(255,255,255,.28);flex-shrink:0;
          display:flex;align-items:center;justify-content:center;
          font-size:${isAct ? '19px' : '16px'};font-weight:900;color:${GP[gi].fg}">${gi+1}</div>
        <span style="flex:1;font-size:${isAct ? '20px' : '17px'};font-weight:800;color:${GP[gi].fg};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${bEsc(g.divisionName)}</span>
        <div style="display:flex;align-items:baseline;gap:3px;flex-shrink:0">
          <span style="font-size:${isAct ? '30px' : '26px'};font-weight:900;color:${GP[gi].fg};font-variant-numeric:tabular-nums;line-height:1">${pts}</span>
          <span style="font-size:13px;font-weight:700;color:${GP[gi].fg};opacity:.7">נק׳</span>
        </div>
        ${isAct ? `<span style="flex-shrink:0;background:rgba(255,255,255,.28);color:${GP[gi].fg};font-weight:800;font-size:13px;border-radius:20px;padding:5px 14px;white-space:nowrap">תור פעיל</span>` : ''}
        ${phoneBtn}
      </div>`;
  }).join('');

  // ── HOOK 3: Phone buttons (זכוכית מגדלת) ─────────────────────────────────
  const bPhonesHtml = !boardPhonesOpen ? '' : `
    <div style="display:flex;flex-direction:column;gap:11px;background:#fff;padding:13px;border-radius:18px;box-shadow:0 8px 26px rgba(34,31,100,.22);border:1px solid #e3e6ef">
      ${DEV_MODE ? `<button onclick="openDevContent()" title="תוכן פיתוח"
        style="width:48px;height:48px;border-radius:11px;border:1.5px solid #d0d4e8;background:#f0f2f8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;color:#3a3f6c">☰</button>` : ''}
      ${GC.groups.map((g, gi) => `
        <button onclick="openMobile('${g.id}',true)" title="${bEsc(g.label)} — ${bEsc(g.divisionName)}"
          style="width:48px;height:72px;border-radius:11px;border:2px solid #fff;background:${GP[gi].bg};cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 3px 10px rgba(34,31,100,.22)">
          <span style="width:15px;height:2px;border-radius:2px;background:${GP[gi].fg};opacity:.65"></span>
          <span style="font-size:22px;font-weight:800;color:${GP[gi].fg};line-height:1">${gi+1}</span>
          <span style="width:9px;height:9px;border-radius:50%;border:1.5px solid ${GP[gi].fg};opacity:.65"></span>
        </button>`).join('')}
    </div>`;

  html += `<div id="board-fitwrap" style="flex:1;overflow:hidden;background:#dfe2e8;display:flex;align-items:center;justify-content:center">
    <div id="gameboard" style="width:1920px;height:1080px;flex:none;transform-origin:center center;position:relative;overflow:hidden;background:#eef0f4 url('assets/board-bg.png') center/cover no-repeat">
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:30px 56px 24px;font-family:Heebo,Arial,sans-serif;color:#221f64">

        <!-- כותרת: גלולת תור (ימין) · לוגואים (מרכז) · לוגו רכבת (שמאל) -->
        <div style="display:flex;align-items:flex-start;gap:24px;flex-shrink:0;height:150px">
          <div style="flex:1;display:flex;justify-content:flex-start">
            <div style="font-size:28px;font-weight:800;color:#123c86;white-space:nowrap;text-align:right;line-height:1.2">אגף הדרכה וחטיבת משנה למנכ"ל&nbsp;&nbsp;2026</div>
          </div>
          <div style="display:flex;align-items:center;justify-content:center">
            <img src="assets/logo-game.png" alt="מסילות ותכנונים" style="height:150px;width:auto">
          </div>
          <div style="flex:1;display:flex;justify-content:flex-end">
            <img src="assets/logo-rail.png" alt="רכבת ישראל" style="height:34px;width:auto;opacity:.9;margin-top:4px">
          </div>
        </div>

        <!-- מפת המסלול -->
        <div style="flex:1;position:relative;min-height:0">
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:${MAPW}px;height:740px">
            <svg width="${MAPW}" height="740" viewBox="0 0 ${MAPW} 740" style="position:absolute;inset:0;z-index:0" fill="none">
              <polyline points="${pathPoints}" stroke="#cdd2de" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="${pathPoints}" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 12"/>
            </svg>
            ${bGatesHtml}${bStationsHtml}
          </div>
        </div>

        <!-- לוח תוצאות -->
        <div style="flex-shrink:0;display:flex;align-items:center;gap:14px">${bRoundHtml}${bScoreHtml}</div>

      </div>

      <!-- זכוכית מגדלת צפה + טלפונים (HOOK 3) -->
      <div style="position:absolute;bottom:166px;left:28px;z-index:50;display:flex;flex-direction:column-reverse;align-items:center;gap:12px">
        <button onclick="toggleBoardPhones()" title="פתיחת תיקי הקבוצות"
          style="width:56px;height:56px;border-radius:50%;border:2px solid #cfe9f7;background:${boardPhonesOpen?'#cfeefc':'#ffffff'};color:#0a6aa0;font-size:23px;cursor:pointer;box-shadow:0 5px 16px rgba(34,31,100,.22);display:flex;align-items:center;justify-content:center">🔍</button>
        ${bPhonesHtml}
      </div>
    </div>
  </div>`;
  } // end if (!activeStationId)

  // Station modal overlay — shown over map when a station is active
  if (activeStationId) {
    html += renderStationModal();
  }

  // Game-over overlay
  if (gameOver && !gameOverDismissed) {
    html += renderGameOverOverlay();
  }

  // Commitment overlay (shown after clicking "→ התחייבות אישית" on end screen)
  if (commitmentOpen) {
    html += renderCommitmentOverlay();
  }


  // Check round complete
  const allPlayedOrWaiting = GC.groups.every(g => {
    const gst = gs(g.id);
    return gst.playedThisRound || gst.waitingOneRound;
  });

  // Status bar — replaced by the scoreboard inside the gameboard

  // Round complete banner
  if (allPlayedOrWaiting) {
    html += `<div style="background:#F5C800;color:#1E1F56;text-align:center;
      font-size:12px;font-weight:700;padding:6px;letter-spacing:.02em">
      ${copy.statusBar.roundComplete}
    </div>`;
  }

  // Soft warning modal
  if (softWarningGroup) {
    html += `
      <div class="overlay">
        <div class="modal">
          <p>${GC.uiCopy.messages.softWarning}</p>
          <div class="modal-btns">
            <button class="btn-sec" onclick="dismissWarning()">${copy.buttons.cancel}</button>
            <button class="btn-danger" onclick="confirmWarning('${softWarningGroup}')">${copy.buttons.confirmSoftWarning}</button>
          </div>
        </div>
      </div>`;
  }

  // Instructions modal overlay
  if (instructionsOpen) {
    const wo = GC.uiCopy.welcome;
    const ACCENTo = ['#221f64','#00aeff','#1abe9b','#e84d3d','#e0a200'];
    const ICONSo = ['pin','gauge','top10','wheel','trophy'];
    const oEsc = (t) => String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    function oScoreColor(line) {
      if (/מלא|10/.test(line)) return ['#1a7a44', 800];
      if (/חלק|5\s*נק|: 5/.test(line)) return ['#9a6a00', 800];
      if (/שגוי|0\s*נק|: 0/.test(line)) return ['#c0392b', 800];
      return ['#4a4636', 500];
    }
    const oSections = wo.sections || [];
    const oRules = oSections.map((s, i) => {
      const isScoring = /ניקוד|נקודות/.test(s.title);
      const raw = String(s.body || '').split(/<br\s*\/?>/i).map(t => t.trim()).filter(Boolean);
      const lines = raw.map(t => { const sc = isScoring ? oScoreColor(t) : ['#4a4636', 500]; return [t, sc[0], sc[1]]; });
      return { num: i+1, title: s.title, lines, color: ACCENTo[i % ACCENTo.length], icon: ICONSo[i % ICONSo.length] };
    });
    const oSplitAt = oRules.length >= 5 ? 3 : Math.ceil(oRules.length / 2);
    const oCardHtml = (r) => `
      <div style="width:31%;background:#fff;border:1.5px solid #ece3cd;border-radius:20px;padding:20px 22px;display:flex;gap:16px;box-shadow:0 5px 16px rgba(34,31,100,.07)">
        <div style="display:flex;flex-direction:column;align-items:center;gap:9px;flex-shrink:0">
          <div style="width:58px;height:58px;border-radius:50%;background:#fff;border:5px solid ${r.color};display:flex;align-items:center;justify-content:center;color:${r.color};font-size:26px;font-weight:800">${r.num}</div>
          <img src="assets/icons/icon-${r.icon}.svg" alt="" style="width:28px;height:28px;opacity:.85">
        </div>
        <div style="display:flex;flex-direction:column;gap:7px;min-width:0">
          <span style="font-size:21px;font-weight:800;line-height:1.15;color:${r.color}">${oEsc(r.title)}</span>
          <div style="display:flex;flex-direction:column;gap:3px">
            ${r.lines.map(ln => `<span style="font-size:16.5px;font-weight:${ln[2]};line-height:1.5;color:${ln[1]};text-wrap:pretty">${oEsc(ln[0])}</span>`).join('')}
          </div>
        </div>
      </div>`;
    const oTopCards = oRules.slice(0, oSplitAt).map(oCardHtml).join('');
    const oBottomCards = oRules.slice(oSplitAt).map(oCardHtml).join('');
    html += `
      <div style="position:fixed;inset:0;z-index:800;overflow:hidden;background:#dfe2e8;display:flex;align-items:center;justify-content:center">
        <div id="instr-board" style="width:1920px;height:1080px;flex:none;transform-origin:center center;position:relative;overflow:hidden;background:#eef0f4 url('assets/board-bg.png') center/cover no-repeat;font-family:Heebo,Arial,sans-serif;direction:rtl">
          <div style="position:absolute;inset:30px;background:#f7f2e6;border-radius:30px;box-shadow:0 18px 50px rgba(34,31,100,.16);border:3px solid #e6dcc2;overflow:hidden">
            <div style="position:absolute;inset:14px;border:2px dashed #d9cdab;border-radius:20px;pointer-events:none;z-index:0"></div>
            <div style="position:relative;z-index:1;display:flex;flex-direction:column;height:100%;padding:30px 54px 32px">
              <div style="flex-shrink:0;display:flex;align-items:center;gap:24px;height:104px">
                <div style="flex:1;display:flex;justify-content:flex-start"><span style="font-size:26px;font-weight:900;color:#221f64">${oEsc(wo.title)}</span></div>
                <div style="display:flex;align-items:center;justify-content:center">
                  <img src="assets/logo-game.png" alt="מסילות ותכנונים" style="height:104px;width:auto">
                </div>
                <div style="flex:1;display:flex;justify-content:flex-end"><img src="assets/logo-rail.png" alt="רכבת ישראל" style="height:32px;width:auto;opacity:.9"></div>
              </div>
              <div style="flex-shrink:0;display:flex;align-items:center;gap:20px;background:#221f64;border-radius:18px;padding:16px 28px;margin-top:6px">
                <div style="width:58px;height:58px;border-radius:50%;background:#f4c40f;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                  <img src="assets/icons/icon-target.svg" alt="" style="width:30px;height:30px">
                </div>
                <div style="display:flex;flex-direction:column;gap:2px">
                  <span style="font-size:15px;font-weight:800;letter-spacing:.05em;color:#f4c40f">מטרת המשחק</span>
                  <p style="font-size:20px;font-weight:600;line-height:1.45;color:#fff;text-wrap:pretty">${oEsc(wo.intro)}</p>
                </div>
              </div>
              <div style="flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:18px;margin-top:14px">
                <div style="display:flex;justify-content:center;gap:20px">${oTopCards}</div>
                <div style="display:flex;justify-content:center;gap:20px">${oBottomCards}</div>
              </div>
              <div style="flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:14px">
                <button onclick="closeInstructions()" style="padding:17px 56px;border-radius:15px;border:none;cursor:pointer;font-family:inherit;font-size:21px;font-weight:800;color:#fff;background:#221f64;box-shadow:0 6px 18px rgba(34,31,100,.28)">${oEsc(wo.closeInstructionsButton || 'חזרה למשחק')}</button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }

  app.innerHTML = html;
  if (gameOver && !gameOverDismissed && !gameOverConfettiLaunched) {
    gameOverConfettiLaunched = true;
    setTimeout(launchConfetti, 80);
    setTimeout(() => SFX.victory(), 80);
  }
  // Scale the projected gameboard to fill available space
  fitBoard();
  const ib = document.getElementById('instr-board');
  const iw = ib && ib.parentElement;
  if (ib && iw) ib.style.transform = 'scale(' + Math.min(iw.clientWidth/1920, iw.clientHeight/1080) + ')';
}

// ── Projected board auto-fit ─────────────────────────────
function fitBoard() {
  const wrap = document.getElementById('board-fitwrap');
  const board = document.getElementById('gameboard');
  if (!wrap || !board) return;
  const s = Math.min(wrap.clientWidth / 1920, wrap.clientHeight / 1080);
  board.style.transform = 'scale(' + s + ')';
}
window.addEventListener('resize', fitBoard);

// ── Board phone toggle (זכוכית מגדלת) ────────────────────────────────────
function toggleBoardPhones() {
  boardPhonesOpen = !boardPhonesOpen;
  facilitatorPreview = boardPhonesOpen; // פתיחה = נעילות נפתחות; סגירה = נעילות חוזרות
  renderApp(); fitBoard();
}

// HOOK 3: פתיחת תצוגת מובייל של קבוצה מתוך הלוח
// asPreview=true → מנחה רואה פתוח תמיד (זכוכית מגדלת)
// asPreview=false → מנחה רואה מה שהשחקן רואה (צ'יפ תחתי)
function openMobile(groupId, asPreview = false) {
  currentView = 'mobile';
  currentGroup = groupId;
  cameFromBoard = true;
  facilitatorPreview = asPreview;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const idx = GC.groups.findIndex(g => g.id === groupId);
  if (idx >= 0) {
    const nb = document.getElementById('nav-g' + (idx + 1));
    if (nb) nb.classList.add('active');
  }
  boardPhonesOpen = false;
  location.hash = 'mobile/' + groupId;
  renderApp();
}

function openDevContent() {
  currentView = 'devContent';
  boardPhonesOpen = false;
  facilitatorPreview = false;
  location.hash = 'devContent';
  renderApp();
}

  const ans = question.answersByGroup[group.id];
  const revealed = devMode || revealedGroups.has(group.id);
  const col = COLOR[group.colorToken];
  const copy = GC.uiCopy;
  const gst = gs(group.id);
  const completed = gst.completedStationIds.includes(activeStationId);

  let inner = '';
  if (!revealed) {
    inner = `<button class="reveal-btn" style="background:${col.primary}"
      onclick="revealGroup('${group.id}')">${copy.buttons.revealAnswer}</button>`;
  } else if (!devMode && answered) {
    inner = `<p style="font-size:12px;color:#5A7A9A;font-style:italic">${GC.uiCopy.groupCard.answerRecorded}</p>`;
  } else if (ans) {
    inner = `
      <div class="ans-row"><span class="ans-lbl">${copy.answerCard.taskLabel}</span><span class="ans-val">${ans.taskName}</span></div>
      <div class="ans-row"><span class="ans-lbl">${copy.answerCard.whatIsWrongLabel}</span><span class="ans-val">${ans.whatIsWrong}</span></div>
      <div class="ans-row"><span class="ans-lbl">${copy.answerCard.correctFixLabel}</span><span class="ans-fix">${ans.correctFix}</span></div>

      ${!devMode ? `<div class="outcome-row">
        <button class="outcome-btn" style="background:#1A7A40" onclick="doOutcome('${group.id}','correct')">

function renderStationScreen() {
  const station = stationById(activeStationId);
  const copy = GC.uiCopy;
  if (!station) return '';

  const question = station.questionId
    ? GC.stationQuestions.find(q => q.id === station.questionId)
    : null;

  let html = `<div id="station-screen">
    <div class="st-month">${station.month || ''}</div>
    <h2 class="st-name">${station.name}</h2>`;

  if (question) {
    html += `
      <div class="q-box">
        <p class="q-text">${question.questionText}</p>
        <div class="timer-wrap">
          <div class="timer-display" id="timer-display" style="color:#1E1F56">${timerRemaining}</div>
          <button class="timer-btn" id="timer-btn"
            style="background:${timerRunning ? '#3A1A1A' : '#1A3A2A'};border-color:${timerRunning ? '#6A2A2A' : '#2A5A3A'};color:${timerRunning ? '#F0A0A0' : '#A0E0B0'}"
            onclick="toggleTimer(${question.timerSeconds})">
            ${timerRunning ? GC.uiCopy.timer.stop : timerRemaining < question.timerSeconds && timerRemaining > 0 ? GC.uiCopy.timer.resume : copy.buttons.startTimer}
          </button>
        </div>
      </div>
      ${lastOutcome ? renderOutcomeBanner(lastOutcome) : ''}
      <div class="cards-grid">`;

    GC.groups.forEach(g => {
      const ans = question.answersByGroup[g.id];
      const revealed = revealedGroups.has(g.id);
      const gst = gs(g.id);
      const completed = gst.completedStationIds.includes(activeStationId);
      const col = COLOR[g.colorToken];

      html += `
        <div class="g-card" style="border-top:4px solid ${col.primary}">
          <div class="g-card-header">
            <span class="g-label">${g.label}</span>
            <span class="g-div">${g.divisionName}</span>
            ${completed ? `<span class="completed-badge">${GC.uiCopy.completedBadge}</span>` : ''}
          </div>`;

      if (!revealed) {
        html += `<button class="reveal-btn" style="background:${col.primary}" onclick="revealGroup('${g.id}')">${copy.buttons.revealAnswer}</button>`;
      } else if (completed && !revealedGroups.has(g.id + '_outcome')) {
        html += `<p class="completed-note">${copy.messages.stationCompleted}</p>`;
      } else if (ans) {
        html += `
          <div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.taskLabel}</span><span class="ans-val">${ans.taskName}</span></div>
          <div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.whatIsWrongLabel}</span><span class="ans-val">${ans.whatIsWrong}</span></div>
          <div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.correctFixLabel}</span><span class="ans-fix">${ans.correctFix}</span></div>
          ${ans.facilitatorNotes ? `<div class="ans-row"><span class="ans-lbl">${GC.uiCopy.answerCard.facilitatorNoteLabel}</span><span class="ans-val">${ans.facilitatorNotes}</span></div>` : ''}
          <div class="outcome-row">
            <button class="outcome-btn" style="background:#1A7A40" onclick="doOutcome('${g.id}','correct')">${copy.buttons.correct}</button>
            <button class="outcome-btn" style="background:#7A6A00" onclick="doOutcome('${g.id}','partial')">${copy.buttons.partial}</button>
            <button class="outcome-btn" style="background:#7A1A1A" onclick="doOutcome('${g.id}','wrong')">${copy.buttons.wrong}</button>
          </div>`;
      } else {
        html += `<p class="completed-note">${GC.uiCopy.messages.noGroupAnswer}</p>`;
      }

      html += `</div>`;
    });

    html += `</div>`;
  } else if (station.transitionMessageId && GC.transitionMessages[station.transitionMessageId]) {
    const tm = GC.transitionMessages[station.transitionMessageId];
    html += `
      <div class="transition-box">
        <div class="transition-title">${tm.title}</div>
        <p class="transition-body">${tm.body}</p>
      </div>`;
  } else {
    html += `<div class="transition-box"><p style="color:#667">${GC.uiCopy.messages.noStationQuestion}</p></div>`;
  }

  html += `</div>`;
  return html;
}

function openStation(stationId) {
  SFX.whoosh();
  if (stationId === 'station_reflection') {
    // "התחנה הבאה שלי" → show commitment screen
    activeStationId = null;
    showCommitment();
    return;
  }
  activeStationId = stationId;
  revealedGroups = new Set();
  softWarningGroup = null;
  lastOutcome = null;
  activeUEResult = null;
  stopTimer();
  const st = stationById(stationId);
  const q = st?.questionId ? GC.stationQuestions.find(q=>q.id===st.questionId) : null;
  timerRemaining = q ? q.timerSeconds : 60;
  renderApp();
}

function goBackToMap() {
  // Detect station_end completion before advancing turn
  if (!DEV_MODE && activeStationId === 'station_end') {
    const finishingGroup = GC.groups[currentTurnGroupIndex];
    const g = gameState[finishingGroup.id];
    if (g.finishedRound === null) {
      g.finishedRound = roundNumber;
      g.playedThisRound = true;
      g.currentStationOrder = stationById('station_end').order + 1;
    }
  }
  if (!DEV_MODE) advanceTurn();
  activeStationId = null;
  lastOutcome = null;
  outcomePopupVisible = false;
  revealedGroups = new Set();
  stopTimer();
  if (!DEV_MODE && GC.groups.every(g => gameState[g.id].finishedRound !== null)) {
    endGame();
    return;
  }
  renderApp();
}

function revealGroup(groupId) {
  const gst = gs(groupId);
  const st = stationById(activeStationId);
  const atStation = gst.currentStationOrder >= st.order;
  const completed = gst.completedStationIds.includes(activeStationId);
  if (!atStation && !completed) {
    softWarningGroup = groupId;
    renderApp();
    return;
  }
  stopTimer();
  revealedGroups.add(groupId);
  renderApp();
}

function dismissWarning() { softWarningGroup = null; renderApp(); }
function confirmWarning(gid) { softWarningGroup = null; revealedGroups.add(gid); renderApp(); }

function dismissOutcomePopup() {
  outcomePopupVisible = false;
  goBackToMap(); // return to map after acknowledging result
}

function closeStationModal() {
  // X button — close without advancing turn.
  // But if an outcome was already applied, or it's station_end, we must go back (state already changed).
  if (lastOutcome || activeStationId === 'station_end') {
    goBackToMap();
  } else {
    activeStationId = null;
    outcomePopupVisible = false;
    renderApp();
  }
}

function doOutcome(groupId, outcome) {
  stopTimer();
  if (outcome === 'correct') SFX.correct();
  else if (outcome === 'partial') SFX.partial();
  else SFX.wrong();
  applyOutcome(groupId, activeStationId, outcome);
  revealedGroups.add(groupId + '_outcome');
  lastOutcome = { groupId, outcome, stayed: false };
  outcomePopupVisible = true;
  // Keep modal open only to show result — do NOT advance to next group automatically.
  // Facilitator sees the result, then clicks "חזרה למסלול" manually.
  // advanceTurn() already called inside applyOutcome — currentTurnGroupIndex updated,
  // but activeStationId stays set so modal remains visible with result.
  renderApp();
}

// Timer
function renderOutcomeBanner({ groupId, outcome }) {
  const group = GC.groups.find(g => g.id === groupId);
  const col = COLOR[group.colorToken];
  const msgKey = outcome === 'correct' ? 'correctOutcome'
               : outcome === 'partial' ? 'partialOutcome'
               : 'wrongOutcome';
  const rawMsg = GC.uiCopy.messages[msgKey];
  const msg = (outcome === 'wrong' && lastOutcome && lastOutcome.stayed)
    ? GC.uiCopy.messages.wrongOutcomeStayed
    : rawMsg;
  const template = GC.uiCopy.outcomeBanner[outcome];
  const text = template.replace('{group}', group.label).replace('{msg}', msg);
  const bg = outcome === 'correct' ? '#E8F5EE' : outcome === 'partial' ? '#FFF8DC' : '#FEE8EC';
  const border = outcome === 'correct' ? '#1A8A40' : outcome === 'partial' ? '#C09000' : '#C8102E';
  const textColor = outcome === 'correct' ? '#0D5A28' : outcome === 'partial' ? '#7A5800' : '#A0001A';
  return `<div style="
    background:${bg};
    border:1px solid ${border};
    border-right:4px solid ${col.primary};
    border-radius:8px;
    padding:12px 16px;
    margin-bottom:14px;
    font-size:14px;
    font-weight:600;
    color:${textColor};
    line-height:1.5;
  ">${text}</div>`;
}

function toggleTimer(totalSecs) {
  if (timerRunning) {
    stopTimer();
  } else {
    if (timerRemaining === 0) timerRemaining = totalSecs;
    timerRunning = true;
    timerInterval = setInterval(() => {
      timerRemaining--;
      SFX.tick();
      if (timerRemaining === 5) SFX.timerWarning();
      if (timerRemaining <= 0) { timerRemaining = 0; stopTimer(); }
      const d = document.getElementById('timer-display');
      const b = document.getElementById('timer-btn');
      const arc = document.getElementById('timer-ring-arc');
      const tColor = timerRemaining === 0 ? '#e84d3d' : timerRemaining <= 10 ? '#e0a200' : '#221f64';
      if (d) {
        const m = Math.floor(timerRemaining/60), s = timerRemaining%60;
        d.textContent = m + ':' + String(s).padStart(2,'0');
        d.style.color = tColor;
      }
      if (arc) {
        arc.setAttribute('stroke-dashoffset', (377 * (1 - timerRemaining / totalSecs)).toFixed(1));
        arc.setAttribute('stroke', tColor);
      }
      if (b && timerRemaining === 0) {
        b.textContent = 'הפעילו טיימר';
        b.style.background = '#1a8c4e';
      }
    }, 1000);
    renderApp();
  }
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  SFX.stopTick();
  timerRunning = false;
}

        <div style="font-size:12px;color:#8A90C0;margin-top:2px">שדות <span style="background:#FEE8EC;color:#C8102E;font-weight:700;border-radius:3px;padding:1px 4px;font-size:11px">⚠ להשלמה</span> דורשים תיאום עם הלקוחה</div>
      </div>
      ${badge}
    </div>
    ${body}
  </div>`;
}

// ── Mobile ──────────────────────────────────────────────
const MOB_PAL = [
  { primary:'#00aeff', deep:'#0a6aa0', fg:'#fff',    tint:'#eaf6fd' },
  { primary:'#1abe9b', deep:'#11876e', fg:'#fff',    tint:'#e8f7f2' },
  { primary:'#e8821e', deep:'#b55a10', fg:'#fff', tint:'#fdf0e8' },
  { primary:'#7b5fd4', deep:'#5b3eb0', fg:'#fff',    tint:'#f1ecfb' },
];
let mobileSplashDone = {};

function renderMobile(app, groupId) {
  const group = GC.groups.find(g => g.id === groupId) || GC.groups[0];
  const gpIdx = GC.groups.indexOf(group);
  const pal = MOB_PAL[gpIdx] || MOB_PAL[0];

  if (gameOver && winnerId) {
    const isWinner = group.id === winnerId;
    const winnerGroup = GC.groups.find(g => g.id === winnerId);
    const winnerIdx = GC.groups.indexOf(winnerGroup);
    const winnerPal = MOB_PAL[winnerIdx] || MOB_PAL[0];
    const ranked = [...GC.groups].sort((a, b) => {
      const ga = gameState[a.id] || {}, gb = gameState[b.id] || {};
      if ((ga.finishedRound||99) !== (gb.finishedRound||99)) return (ga.finishedRound||99) - (gb.finishedRound||99);
      return (gb.points||0) - (ga.points||0);
    });
    const myRank = ranked.findIndex(g => g.id === group.id) + 1;
    const medals = ['🥇', '🥈', '🥉', '4️⃣'];
    const rows = ranked.map((g, i) => {
      const gst = gameState[g.id] || {};
      const gpal = MOB_PAL[GC.groups.indexOf(g)] || MOB_PAL[0];
      const isMe = g.id === group.id;
      return `<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;
          background:${isMe ? gpal.tint : '#F8F9FC'};border-radius:8px;
          border:1.5px solid ${isMe ? gpal.primary : '#E0E4F0'}">
        <span style="font-size:18px;min-width:28px">${medals[i]}</span>
        <div style="flex:1;font-size:17px;font-weight:700;color:#1E1F56">${g.label}</div>
        <div style="font-size:17px;font-weight:800;color:${gpal.primary}">${gst.points||0} נק'</div>
      </div>`;
    }).join('');
    app.innerHTML = `<div dir="rtl" style="min-height:100vh;background:${isWinner ? winnerPal.tint : '#F5F7FA'};
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:32px 24px;text-align:center">
      <div style="font-size:72px;line-height:1;margin-bottom:12px">${isWinner ? '🏆' : medals[myRank-1]}</div>
      <div style="font-size:28px;font-weight:900;color:#1E1F56;margin-bottom:6px">
        ${isWinner ? 'ניצחנו!' : 'כל הכבוד!'}
      </div>
      <div style="display:inline-block;background:${pal.primary};color:${pal.fg};
        border-radius:10px;padding:6px 20px;font-size:17px;font-weight:700;margin-bottom:6px">
        ${group.label} — ${group.divisionName}
      </div>
      ${!isWinner ? `<div style="font-size:17px;color:#8A90C0;margin-bottom:4px">מקום ${myRank}</div>
        <div style="font-size:17px;color:#3A3E78;margin-bottom:20px">מנצחת: ${winnerGroup.label}</div>` : `<div style="margin-bottom:20px"></div>`}
      <div style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px">
        ${rows}
      </div>
    </div>`;
    if (isWinner && !gameOverConfettiLaunched) {
      gameOverConfettiLaunched = true;
      setTimeout(launchConfetti, 80);
    }
    return;
  }

  app.innerHTML = `<div id="mobile-wrap" dir="rtl"></div>`;
  const wrap = document.getElementById('mobile-wrap');

  // כפתור חזרה ללוח — גלוי רק למנחה (cameFromBoard)
  if (cameFromBoard || facilitatorPreview || DEV_MODE) {
    const backBtn = document.createElement('button');
    backBtn.onclick = () => { currentView = 'facilitator'; cameFromBoard = false; renderApp(); };
    backBtn.title = `${group.label} · ${group.divisionName} — חזרה ללוח`;
    backBtn.style.cssText = 'position:fixed;top:50%;left:8px;transform:translateY(-50%);z-index:9999;background:rgba(30,31,86,.88);border:none;border-radius:20px;width:36px;height:60px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.35);font-size:18px;color:#fff';
    backBtn.innerHTML = '🏠';
    document.getElementById('app').prepend(backBtn);
  }

  // Lock folder if another group is currently playing
  const currentGroup = GC.groups[currentTurnGroupIndex];
  const isLocked = !DEV_MODE && !facilitatorPreview && gameStarted && group.id !== currentGroup.id;

  if (isLocked) {
    renderFolderLocked(wrap, group, pal, currentGroup);
    return;
  }

  if (!mobileSplashDone[groupId]) {
    renderSplash(wrap, group, pal);
  } else if (refOpen) {
    const goals = GC.companyGoals || [];
    const glossary = GC.planningGlossary || [];
    renderReferenceScreen(wrap, pal, goals, glossary);
  } else {
    renderFolder(wrap, group, pal);
  }
}

function renderFolderLocked(wrap, group, pal, currentGroup) {
  const lockKey = group.id + '_' + currentGroup.id;
  if (_lockedSoundKey !== lockKey) { _lockedSoundKey = lockKey; SFX.locked(); }
  const mf = GC.uiCopy.mobileFolder;
  const lockedTitle = (mf.lockedMessage || 'תור {group} — המתינו לתורכם')
    .replace('{group}', currentGroup.label).replace(/^.*—\s*/, '');
  const activeIdx = GC.groups.indexOf(currentGroup);
  const activePal = MOB_PAL[activeIdx] || MOB_PAL[0];
  const dots = GC.groups.map((_, i) => {
    const dp = MOB_PAL[i] || MOB_PAL[0];
    return `<span style="width:10px;height:10px;border-radius:50%;background:${dp.primary};opacity:${i === activeIdx ? 1 : 0.3}"></span>`;
  }).join('');
  wrap.innerHTML = `
    <div style="width:100%;min-height:100vh;background:#e7e9ef;display:flex;justify-content:center">
      <div style="width:100%;max-width:460px;min-height:100vh;background:#eef0f4;display:flex;flex-direction:column;overflow:hidden">
        <div style="flex-shrink:0;background:#fff;border-bottom:3px solid ${pal.primary};padding:18px 20px 14px">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="background:${pal.primary};color:${pal.fg};font-size:14px;font-weight:800;border-radius:999px;padding:5px 15px">${group.label}</span>
            <span style="font-size:15px;font-weight:600;color:#5a6075;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${group.divisionName || ''}</span>
          </div>
        </div>
        <div style="flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:34px 30px;text-align:center">
          <div style="width:120px;height:120px;border-radius:50%;background:#fff;border:6px solid #5a6d77;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(34,31,100,.10)">
            <img src="assets/icons/icon-lock.svg" alt="" style="width:58px;height:58px">
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
            <span style="font-size:24px;font-weight:900;color:#1b1c4e;line-height:1.2">${lockedTitle}</span>
            <p style="font-size:16px;font-weight:500;line-height:1.55;color:#5a6075;max-width:300px">${mf.lockedWait || 'התיק שלכם ייפתח כשיגיע תורכם'}</p>
          </div>
          <div style="display:flex;align-items:center;gap:10px;background:#e8f7ff;border:2px solid #00aeff;border-radius:14px;padding:12px 18px;animation:pulseTeal 2s infinite">
            <span style="width:28px;height:28px;border-radius:50%;background:${activePal.primary};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;color:${activePal.fg};font-size:13px;font-weight:800">${activeIdx + 1}</span>
            <span style="font-size:16px;font-weight:800;color:#1b1c4e">${currentGroup.label} עונה כעת</span>
          </div>
        </div>
        <div style="flex-shrink:0;padding:0 24px 30px;display:flex;flex-direction:column;align-items:center;gap:10px">
          <div style="display:flex;gap:7px">${dots}</div>
          <span style="font-size:12px;font-weight:600;color:#9aa0b8">התיק ייפתח אוטומטית כשיגיע תורכם</span>
        </div>
      </div>
    </div>`;
}

function renderSplash(wrap, group, pal) {
  const gpIdx = GC.groups.indexOf(group);
  const tm = (GC.transitionMessages && GC.transitionMessages.transition_start) || {};
  const sEsc = (t) => String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  wrap.style.cssText = 'width:100%;min-height:100vh;background:#e7e9ef;display:flex;justify-content:center;font-family:Heebo,Arial,sans-serif;color:#1b1c4e';
  wrap.innerHTML = `
    <div style="width:100%;max-width:460px;min-height:100vh;background:${pal.tint};display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(34,31,100,.12)">
      <div style="flex-shrink:0;background:#fff;border-bottom:3px solid ${pal.primary};padding:18px 22px;display:flex;flex-direction:column;align-items:center;gap:12px">
        <img src="assets/logo-game.png" alt="מסילות ותכנונים" style="height:58px;width:auto">
      </div>
      <div style="flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px 28px">
        <div style="width:112px;height:112px;border-radius:50%;background:#fff;border:6px solid ${pal.primary};display:flex;align-items:center;justify-content:center;color:${pal.primary};font-size:52px;font-weight:900;box-shadow:0 8px 22px rgba(34,31,100,.14)">${gpIdx+1}</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:5px">
          <span style="font-size:27px;font-weight:900;color:#1b1c4e">${sEsc(group.label)}</span>
          <span style="font-size:16px;font-weight:600;color:#5a6075;text-align:center">${sEsc(group.divisionName)}</span>
        </div>
        <div style="width:100%;background:#fff;border-radius:18px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(34,31,100,.08)">
          <span style="font-size:20px;font-weight:800;color:${pal.primary};text-align:center">${sEsc(tm.title||'כולם לעלות!')}</span>
          <p style="font-size:14.5px;font-weight:500;line-height:1.6;color:#4a5070;text-align:center;text-wrap:pretty">${sEsc(tm.body||'')}</p>
        </div>
      </div>
      <div style="flex-shrink:0;padding:18px 24px 28px">

      </div>
    </div>`;
}

function startFolder(groupId) {
  mobileSplashDone[groupId] = true;
  renderApp();
}

let activeTab = {};
let openTasks = {};
let reminderOpen = {};
let refOpen = false, refTab = 'goals', openGoals = {};

function renderFolder(wrap, group, pal) {
  wrap.style.cssText = 'position:relative;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden';
  const gid = group.id;
  const tab = activeTab[gid] || 'tasks';
  const tasks = GC.visibleTasks[gid] || [];
  const comp = GC.compensationModels[gid];

  const content = tab === 'tasks' ? renderTasksList(tasks, pal, gid) : renderCompCard(comp, pal, gid);

  wrap.innerHTML = `
    <div style="flex-shrink:0;background:#fff;border-bottom:3px solid ${pal.primary};padding:18px 20px 14px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="background:${pal.primary};color:${pal.fg};font-size:14px;font-weight:800;border-radius:999px;padding:5px 15px">${group.label}</span>
        <span style="font-size:15px;font-weight:600;color:#5a6075;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${group.divisionName}</span>
        <div style="flex:1"></div>
        <button onclick="switchGroupFolder()" title="החלפת קבוצה (תצוגה)" style="width:30px;height:30px;border-radius:50%;border:1px solid #e0e3ee;background:#fff;cursor:pointer;font-size:13px;color:#9aa0b8">↻</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;margin-top:14px">
        <img src="assets/logo-game.png" alt="מסילות ותכנונים" style="height:80px;width:auto">
      </div>
    </div>
    <div style="flex-shrink:0;display:flex;background:#fff;border-bottom:1px solid #eceef4">
      <button onclick="switchTab('${gid}','tasks')" style="flex:1;padding:14px 8px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:${tab==='tasks'?'800':'500'};color:${tab==='tasks'?pal.deep:'#8990a8'};border-bottom:3px solid ${tab==='tasks'?pal.primary:'transparent'}">משימות לבדיקה</button>
      <button onclick="switchTab('${gid}','compensation')" style="flex:1;padding:14px 8px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:${tab==='compensation'?'800':'500'};color:${tab==='compensation'?pal.deep:'#8990a8'};border-bottom:3px solid ${tab==='compensation'?pal.primary:'transparent'}">מודל תגמול לבדיקה</button>
    </div>

        <span style="font-size:20px">📖</span>חומרי עזר · צריכים תזכורת?
      </button>
    </div>`;
}

function renderTasksList(tasks, pal, gid) {
  if (!tasks || tasks.length === 0) {
    return `<div style="padding:20px 4px;color:#8A9AAA;font-size:17px;line-height:1.6">
      ${GC.uiCopy.messages.mobileTasksFallback}
    </div>`;
  }
  return `<div style="display:flex;flex-direction:column;gap:12px">
    ${tasks.map(t => renderTaskCard(t, pal, gid)).join('')}
  </div>`;
}

function renderTaskCard(task, pal, gid) {
  const open = !!(openTasks[gid] && openTasks[gid][task.taskId]);
  const errs = (DEV_MODE && task.devErrors) ? new Set(task.devErrors) : new Set();
  const dv = (v, field) => {
    if (errs.has(field)) return `<span style="background:#FFF3CD;color:#7A5000;font-weight:700;padding:0 4px;border-radius:3px;border-bottom:2px solid #E07000">⚠️ ${v}</span>`;
    return devStyleVal(v);
  };
  const classLabel = task.classification === 'top10' ? GC.uiCopy.classificationLabels.top10 : GC.uiCopy.classificationLabels.routine;
  const isTop10 = task.classification === 'top10';
  const tagBg = isTop10 ? pal.primary : '#eef0f5', tagFg = isTop10 ? pal.fg : '#7a809a';
  const nameDisplay = errs.has('taskName')
    ? `<span style="background:#FFF3CD;color:#7A5000;font-weight:700;padding:0 4px;border-radius:3px;border-bottom:2px solid #E07000">⚠️ ${task.taskName}</span>`
    : task.taskName;
  const milestonesErr = errs.has('milestones');
  const msWrapStyle = `display:flex;flex-direction:column;gap:9px${milestonesErr ? ';border:1.5px solid #E07000;border-radius:6px;padding:6px;background:#FFFBF0' : ''}`;

  const detail = open ? `
    <div style="padding:4px 16px 18px;display:flex;flex-direction:column;gap:16px">
      <div style="display:flex;flex-direction:column;gap:9px">
        <span style="font-size:12px;font-weight:800;letter-spacing:.03em;color:${pal.primary}">${GC.uiCopy.taskSections.strategic}</span>
        <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.companyGoal}</span><span class="f-val">${dv(task.companyGoal,'companyGoal')}</span></div>
        <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.goal}</span><span class="f-val">${dv(task.goal,'goal')}</span></div>
        <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.outcomeMetric}</span><span class="f-val">${dv(task.outcomeMetric,'outcomeMetric')}</span></div>
        <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.classification}</span><span class="f-val">${dv(classLabel,'classification')}</span></div>
      </div>
      <div style="height:1px;background:#eef0f5"></div>
      <div style="display:flex;flex-direction:column;gap:9px">
        <span style="font-size:12px;font-weight:800;letter-spacing:.03em;color:${pal.primary}">${GC.uiCopy.taskSections.details}</span>
        <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.taskDescription}</span><span class="f-val">${dv(task.taskDescription,'taskDescription')}</span></div>
        <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.annualAchievement}</span><span class="f-val">${dv(task.annualAchievement,'annualAchievement')}</span></div>
        <div class="f-row"><span class="f-lbl">${GC.uiCopy.taskFields.outputMetricType}</span><span class="f-val">${dv(task.outputMetricType,'outputMetricType')}</span></div>
      </div>
      <div style="height:1px;background:#eef0f5"></div>
      <div style="${msWrapStyle}">
        <span style="font-size:12px;font-weight:800;letter-spacing:.03em;color:${pal.primary}">${GC.uiCopy.taskSections.planning}${milestonesErr ? ' <span style="color:#E07000;font-size:13px">⚠️</span>' : ''}</span>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${['Q1','Q2','Q3','Q4'].map(q => {
            const qVal = milestonesErr
              ? `<span style="background:#FFF3CD;color:#7A5000;font-weight:700;padding:0 2px;border-radius:3px">⚠️ ${task.milestones[q]}</span>`
              : devStyleVal(task.milestones[q]);
            return `<div style="background:#f6f7fb;border-radius:10px;padding:9px 11px;display:flex;flex-direction:column;gap:3px">
              <span style="font-size:11px;font-weight:800;color:#fff;background:${milestonesErr ? '#e07000' : pal.primary};border-radius:6px;padding:1px 8px;align-self:flex-start">${q}</span>
              <span style="font-size:17px;font-weight:600;color:#2e3450;line-height:1.4">${qVal}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      ${DEV_MODE && task.devHint ? (() => {
        const FIELD_TO_QID = {
          taskName: 'q_measurable', companyGoal: 'q_company_goal', goal: 'q_company_goal',
          outcomeMetric: 'q_outcome_metric', classification: 'q_top10',
          annualAchievement: 'q_measurable', outputMetricType: 'q_output_metric',
          milestones: 'q_milestones'
        };
        const QID_LABELS = {
          q_company_goal: 'מטרת חברה ויעד',
          q_outcome_metric: 'מדד תוצאה',
          q_top10: 'Top 10 / שוטפת',
          q_measurable: 'ניסוח מדיד',
          q_output_metric: 'מדד תפוקה',
          q_milestones: 'אבני דרך רבעוניות'
        };
        const uniqueQids = [...new Set((task.devErrors || []).map(f => FIELD_TO_QID[f]).filter(Boolean))];
        const stationsHtml = uniqueQids.map(qid => {
          const q = GC.stationQuestions.find(sq => sq.id === qid);
          if (!q) return '';
          const ans = q.answersByGroup ? q.answersByGroup[gid] : null;
          return `<div style="margin-top:7px;padding:9px 11px;background:#FFF8E1;border-radius:5px;border-right:3px solid #C8920A">
            <div style="font-weight:800;font-size:15px;color:#5D4000;margin-bottom:5px">📍 תחנה: ${QID_LABELS[qid] || qid}</div>
            <div style="color:#6B4D00;margin-bottom:4px;font-size:14px;line-height:1.55"><strong>שאלה:</strong> ${q.questionText}</div>
            ${ans ? `<div style="color:#7A3000;margin-bottom:4px;font-size:14px;line-height:1.55"><strong>מה שגוי:</strong> ${ans.whatIsWrong}</div>
            <div style="color:#2D5A00;font-size:14px;line-height:1.55"><strong>תיקון:</strong> ${ans.correctFix}</div>` : ''}
          </div>`;
        }).join('');
        return `<div style="margin-top:8px;padding:8px 10px;background:#FFF3CD;border-radius:6px;border-right:3px solid #E0A020;font-size:15px;color:#7A5000;line-height:1.6;direction:rtl">
          <strong>⚠️ טעות מוטמנת</strong>
          ${stationsHtml}
        </div>`;
      })() : ''}
    </div>` : '';

  return `
    <div style="background:#fff;border-radius:14px;border-right:4px solid ${pal.primary};box-shadow:0 2px 8px rgba(34,31,100,.07);overflow:hidden">

function buildWheelSvg(ueSet) {
  const SEGC = [['#ff7a4d','#fff'],['#2dc7b8','#fff'],['#ffc233','#221f64'],['#7b6ef6','#fff'],['#ff6fa5','#fff']];
  const N = ueSet.length || 1;
  const SEG = 360 / N;
  const polar = (cx, cy, r, deg) => { const a = (deg - 90) * Math.PI / 180; return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; };
  const shorten = (t) => { t = String(t || ''); return t.length > 14 ? t.slice(0, 13) + '…' : t; };
  const segs = ueSet.map((r, i) => {
    const a0 = i * SEG, a1 = a0 + SEG;
    const p0 = polar(150, 150, 146, a0), p1 = polar(150, 150, 146, a1);
    const large = SEG > 180 ? 1 : 0;
    const d = `M150 150 L${p0.x.toFixed(1)} ${p0.y.toFixed(1)} A146 146 0 ${large} 1 ${p1.x.toFixed(1)} ${p1.y.toFixed(1)} Z`;
    const mid = a0 + SEG / 2, lp = polar(150, 150, 92, mid);
    const c = SEGC[i % SEGC.length];
    return `<path d="${d}" fill="${c[0]}" stroke="#fff" stroke-width="3"></path>
      <g transform="translate(${lp.x.toFixed(1)} ${lp.y.toFixed(1)}) rotate(${mid.toFixed(1)})">
        <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" fill="${c[1]}" font-family="Heebo,sans-serif" font-size="13" font-weight="800">${shorten(r.label)}</text>
      </g>`;
  }).join('');
  return `<svg width="300" height="300" viewBox="0 0 300 300" style="display:block">
    <circle cx="150" cy="150" r="146" fill="#fff" stroke="#8a2433" stroke-width="8"></circle>
    ${segs}
    <circle cx="150" cy="150" r="54" fill="#fff" stroke="#8a2433" stroke-width="5"></circle>
  </svg>`;
}

function spinWheel(groupId, ueSetId) {
  if (wheelSpinState && wheelSpinState.spinning) return;
  SFX.wheelSpin();
  const ueSet = GC.unexpectedEvents[ueSetId] || [];
  const N = ueSet.length || 1;
  const idx = Math.floor(Math.random() * N);
  const SEG = 360 / N;
  const target = idx * SEG + SEG / 2;
  const finalDeg = 360 * 6 + (360 - target);
  wheelSpinState = { spinning: true, finalDeg, idx, result: ueSet[idx], groupId };
  renderApp();
  requestAnimationFrame(() => {
    const el = document.getElementById('ue-wheel-svg');
    if (!el) return;
    el.style.transition = 'none';
    el.style.transform = 'rotate(0deg)';
    void el.offsetWidth;
    requestAnimationFrame(() => {
      el.style.transition = 'transform 5s cubic-bezier(.12,.57,.13,1)';
      el.style.transform = `rotate(${finalDeg}deg)`;
    });
  });
  setTimeout(() => {
    const res = wheelSpinState ? wheelSpinState.result : null;
    if (!res) return;
    res.waitRounds === 0 ? SFX.wheelGood() : SFX.wheelBad();
    activeUEResult = res;
    gs(groupId).usedUnexpectedEventIds.push(res.resultId);
    wheelSpinState = null;
    renderApp();
  }, 5150);
}

function devSelectUEResult(groupId, ueSetId, idx) {
  if (!DEV_MODE) return;
  const ueSet = GC.unexpectedEvents[ueSetId] || [];
  activeUEResult = ueSet[idx];
  // Don't mark as used in dev mode — facilitator is just previewing
  renderApp();
}

function doUEOutcome(groupId, waitRounds) {
  const g = gs(groupId);
  const st = stationById(activeStationId);
  if (!g.completedStationIds.includes(activeStationId))
    g.completedStationIds.push(activeStationId);
  g.playedThisRound = true;
  g.currentStationOrder = st.order + 1; // always advance — wait happens at the NEXT station
  if (waitRounds > 0) {
    g.waitingOneRound = true;
    g.waitingReason = 'unexpected';
  }
  activeUEResult = null;
  goBackToMap();
}

function switchTab(gid, tab) { activeTab[gid] = tab; renderApp(); }
function switchGroupFolder() {
  const idx = GC.groups.findIndex(g => g.id === currentGroup);
  if (idx < 0) return;
  const next = GC.groups[(idx + 1) % GC.groups.length];
  openMobile(next.id);
}

  if (!openTasks[gid]) openTasks[gid] = {};
  openTasks[gid][taskId] = !openTasks[gid][taskId];
  renderApp();
}
function toggleReminder(gid) { reminderOpen[gid] = !reminderOpen[gid]; renderApp(); }
function openRef() { refOpen = true; renderApp(); }
function closeRef() { refOpen = false; renderApp(); }
function setRefTab(t) { refTab = t; renderApp(); }
function toggleGoal(i) { openGoals[i] = !openGoals[i]; renderApp(); }

GC.groups.forEach((g, i) => {
  const el = document.getElementById('nav-g' + (i+1) + '-lbl');
  if (el) el.textContent = GC.uiCopy.nav.mobile_group
    .replace('{n}', i+1)
    .replace('{division}', g.divisionName);
});
document.getElementById('nav').style.display = 'none';

// ── Hash routing: read URL on load ───────────────────────
(function applyHash() {
  const hash = location.hash.replace('#', '');
  if (!hash) return;
  const [view, group] = hash.split('/');
  if (view === 'mobile' && group) {
    currentView = 'mobile';
    currentGroup = group;
    // Listen for real-time game state from facilitator
    fbDb.ref('gameState').on('value', (snapshot) => {
      const state = snapshot.val();
      if (state !== null) {
        gameStarted = state.gameStarted;
        currentTurnGroupIndex = state.currentTurnGroupIndex;
        gameOver = !!state.gameOver;
        winnerId = state.winnerId || null;
        if (state.groupData) {
          GC.groups.forEach(g => {
            if (state.groupData[g.id]) {
              gameState[g.id].points = state.groupData[g.id].points || 0;
              gameState[g.id].finishedRound = state.groupData[g.id].finishedRound || null;
            }
          });
        }
      }
      renderApp();
    });
    return; // listener will call renderApp
  } else if (view === 'devContent') {
    currentView = 'devContent';
    gameStarted = true;
  } else if (view === 'answerKey') {
    currentView = 'answerKey';
    gameStarted = true;
  } else if (view === 'facilitator') {
    currentView = 'facilitator';
  }
})();

// Facilitator loading the page → reset Firebase to pre-game (unlocks all mobile folders)
if (currentView !== 'mobile' && currentView !== 'answerKey') pushGameState();

renderApp();
</script>
